# BauPilot — Alembic-Konfiguration
# Migrationen fuer Schema-per-Tenant (B-003)

[alembic]
script_location = alembic
prepend_sys_path = .

# Datenbank-URL — wird ueberschrieben durch Umgebungsvariable DATABASE_URL
# oder durch den Aufruf in run-migration.ps1
sqlalchemy.url = postgresql://baupilot:baupilot_secret@localhost:5436/baupilot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
