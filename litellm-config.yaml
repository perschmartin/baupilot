# BauPilot — LiteLLM-Konfiguration
# Ausschliesslich lokale Modelle via Ollama (G7 Digitale Souveraenitaet)

model_list:
  - model_name: "default"
    litellm_params:
      model: "ollama/qwen2.5:14b"
      api_base: "http://host.docker.internal:11434"
      extra_body:
        keep_alive: -1
        options:
          num_ctx: 8192

  - model_name: "qwen-32b"
    litellm_params:
      model: "ollama/qwen2.5:32b"
      api_base: "http://host.docker.internal:11434"
      extra_body:
        keep_alive: -1
        options:
          num_ctx: 8192

  - model_name: "llama3"
    litellm_params:
      model: "ollama/llama3.1:8b"
      api_base: "http://host.docker.internal:11434"

  - model_name: "embedding"
    litellm_params:
      model: "ollama/nomic-embed-text"
      api_base: "http://host.docker.internal:11434"

general_settings:
  master_key: null
  drop_params: true

litellm_settings:
  telemetry: false
  drop_params: true
  # P6: an httpx-Timeout im ChatService (120 s) angeglichen; nginx (180 s) ist aeussere Schranke.
  request_timeout: 120
