# BauPilot — LiteLLM-Konfiguration
# Ausschliesslich lokale Modelle via Ollama (G7 Digitale Souveraenitaet)

model_list:
  - model_name: "default"
    litellm_params:
      model: "ollama/qwen2.5:14b"
      api_base: "http://host.docker.internal:11434"

  - model_name: "qwen-32b"
    litellm_params:
      model: "ollama/qwen2.5:32b"
      api_base: "http://host.docker.internal:11434"

  - model_name: "llama3"
    litellm_params:
      model: "ollama/llama3.1:8b"
      api_base: "http://host.docker.internal:11434"

  - model_name: "embedding"
    litellm_params:
      model: "ollama/nomic-embed-text"
      api_base: "http://host.docker.internal:11434"

general_settings:
  master_key: null
  drop_params: true

litellm_settings:
  telemetry: false
  drop_params: true
