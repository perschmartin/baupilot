const PRIO_FARBEN = {
  kritisch: { bg: 'bg-red-900/40', border: 'border-red-700', text: 'text-red-300', dot: 'bg-red-500' },
  hoch:     { bg: 'bg-orange-900/30', border: 'border-orange-700', text: 'text-orange-300', dot: 'bg-orange-500' },
  mittel:   { bg: 'bg-blue-900/30', border: 'border-blue-700', text: 'text-blue-300', dot: 'bg-blue-500' },
  niedrig:  { bg: 'bg-gray-800/30', border: 'border-gray-600', text: 'text-gray-400', dot: 'bg-gray-500' },
}

const STATUS_LABELS = {
  offen: 'Offen', in_bearbeitung: 'In Bearbeitung', geprueft: 'Gepr\u00FCft',
  abgeschlossen: 'Abgeschlossen', storniert: 'Storniert',
}

function AufgabenSeite() {
  const { token } = useAuth()
  const [aufgaben, setAufgaben] = useState([])
  const [gesamt, setGesamt] = useState(0)
  const [filter, setFilter] = useState('')
  const [loading, setLoading] = useState(true)
  const [selected, setSelected] = useState(null)
  const [showCreate, setShowCreate] = useState(false)
  const [err, setErr] = useState('')

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      const q = filter ? `&status=${filter}` : ''
      const r = await bpApi(`/aufgaben/?projekt=FLI${q}`, { token })
      setAufgaben(r.aufgaben || []); setGesamt(r.gesamt || 0)
    } catch (e) { setErr(e.detail || 'Fehler beim Laden') }
    setLoading(false)
  }, [token, filter])

  useEffect(() => { laden() }, [laden])

  if (selected) return h(AufgabeDetail, { id: selected, onBack: () => { setSelected(null); laden() } })

  return h('div', { className: 'fade-in' },
    // Kopfzeile
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, 'Aufgaben'),
        h('p', { className: 'text-sm text-bp-muted' }, `${gesamt} Aufgabe${gesamt !== 1 ? 'n' : ''} im Projekt FLI`),
      ),
      h('button', { className: 'bp-btn px-4 py-2 rounded-lg text-sm', onClick: () => setShowCreate(true) }, '+ Neue Aufgabe'),
    ),
    // Filter
    h('div', { className: 'flex gap-2 mb-4 flex-wrap' },
      [['', 'Alle'], ['offen', 'Offen'], ['in_bearbeitung', 'In Bearbeitung'], ['geprueft', 'Gepr\u00FCft'], ['abgeschlossen', 'Erledigt']].map(([v, l]) =>
        h('button', {
          key: v, onClick: () => setFilter(v),
          className: `px-3 py-1.5 rounded-lg text-xs font-medium transition ${
            filter === v ? 'bg-bp-400 text-bp-dark' : 'bg-bp-card text-bp-muted hover:text-white border border-white/5'
          }`,
        }, l)
      ),
    ),
    // Fehler
    err && h(Alert, { type: 'error' }, err),
    // Create-Dialog
    showCreate && h(AufgabeErstellen, { onClose: () => setShowCreate(false), onCreated: () => { setShowCreate(false); laden() } }),
    // Liste
    loading ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Laden...')
    : aufgaben.length === 0 ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Keine Aufgaben gefunden.')
    : h('div', { className: 'space-y-2' },
        aufgaben.map(a => {
          const p = PRIO_FARBEN[a.prioritaet] || PRIO_FARBEN.mittel
          const ueberfaellig = a.frist && new Date(a.frist) < new Date() && a.status !== 'abgeschlossen' && a.status !== 'storniert'
          return h('div', {
            key: a.id,
            className: `${p.bg} border ${p.border} rounded-lg p-4 cursor-pointer hover:brightness-110 transition fade-in`,
            onClick: () => setSelected(a.id),
          },
            h('div', { className: 'flex items-start justify-between gap-4' },
              h('div', { className: 'flex-1 min-w-0' },
                h('div', { className: 'flex items-center gap-2 mb-1' },
                  h('span', { className: `w-2 h-2 rounded-full ${p.dot}` }),
                  h('span', { className: 'text-xs font-mono text-bp-muted' }, a.nummer),
                  h('span', { className: `text-xs px-2 py-0.5 rounded ${p.text} ${p.bg}` }, a.prioritaet),
                  ueberfaellig && h('span', { className: 'text-xs px-2 py-0.5 rounded bg-red-900 text-red-300 animate-pulse' }, '\u00DCberf\u00E4llig'),
                ),
                h('p', { className: 'text-sm text-white font-medium truncate' }, a.gegenstand),
                h('div', { className: 'flex gap-4 mt-2 text-xs text-bp-muted' },
                  a.zustaendig_name && h('span', null, '\u{1F464} ', a.zustaendig_name),
                  a.frist && h('span', null, '\u{1F4C5} ', new Date(a.frist).toLocaleDateString('de-DE')),
                ),
              ),
              h('span', { className: `text-xs px-2 py-1 rounded whitespace-nowrap ${
                a.status === 'abgeschlossen' ? 'bg-green-900/40 text-green-300' :
                a.status === 'storniert' ? 'bg-gray-800 text-gray-400' :
                'bg-bp-card text-bp-muted'
              }` }, STATUS_LABELS[a.status] || a.status),
            ),
          )
        }),
      ),
  )
}

// ================================================================
// AUFGABE ERSTELLEN Dialog
// ================================================================

function AufgabeErstellen({ onClose, onCreated }) {
  const { token } = useAuth()
  const [gegenstand, setGegenstand] = useState('')
  const [beschreibung, setBeschreibung] = useState('')
  const [prioritaet, setPriorit] = useState('mittel')
  const [frist, setFrist] = useState('')
  const [err, setErr] = useState('')
  const [loading, setLoading] = useState(false)
  // AE-03: Zustaendig-Dropdown statt Freitext. Wir laden die Benutzer-Liste
  // einmalig beim Öffnen des Dialogs und merken den ausgewaehlten Eintrag.
  const [benutzer, setBenutzer] = useState([])
  const [zustaendigId, setZustaendigId] = useState('')

  useEffect(() => {
    bpApi('/auth/benutzer-liste', { token })
      .then(r => setBenutzer(r.benutzer || []))
      .catch(() => { /* Fehler still — Feld bleibt leer und ist optional */ })
  }, [token])

  const submit = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true)
    try {
      const body = { gegenstand, prioritaet }
      if (beschreibung) body.beschreibung = beschreibung
      if (frist) body.frist = frist
      // AE-03: nur uebertragen, wenn ein Benutzer ausgewaehlt wurde.
      // Backend akzeptiert das Feld optional (siehe aufgaben/schemas.py).
      if (zustaendigId) body.zustaendig_benutzer_id = zustaendigId
      await bpApi('/aufgaben/?projekt=FLI', { method: 'POST', body, token })
      onCreated()
    } catch (e) { setErr(e.detail || 'Fehler') }
    setLoading(false)
  }

  return h('div', { className: 'bg-bp-card border border-white/10 rounded-xl p-6 mb-4 fade-in' },
    h('div', { className: 'flex justify-between items-center mb-4' },
      h('h3', { className: 'text-sm font-semibold text-white' }, 'Neue Aufgabe'),
      h('button', { className: 'text-bp-muted hover:text-white text-lg', onClick: onClose }, '\u2715'),
    ),
    h('form', { onSubmit: submit },
      h(Alert, { type: 'error' }, err),
      h(Input, { label: 'Gegenstand', value: gegenstand, onChange: e => setGegenstand(e.target.value), required: true, placeholder: 'Was soll erledigt werden?' }),
      h('div', { className: 'mb-4' },
        h('label', { className: 'block text-sm text-bp-muted mb-1.5' }, 'Beschreibung'),
        h('textarea', { className: 'bp-input w-full px-4 py-3 rounded-lg text-sm', rows: 3, value: beschreibung, onChange: e => setBeschreibung(e.target.value), placeholder: 'Details, Kontext, Anforderungen...' }),
      ),
      h('div', { className: 'grid grid-cols-2 gap-4 mb-4' },
        h('div', null,
          h('label', { className: 'block text-sm text-bp-muted mb-1.5' }, 'Priorit\u00E4t'),
          h('select', { className: 'bp-input w-full px-4 py-3 rounded-lg text-sm', value: prioritaet, onChange: e => setPriorit(e.target.value) },
            h('option', { value: 'niedrig' }, 'Niedrig'),
            h('option', { value: 'mittel' }, 'Mittel'),
            h('option', { value: 'hoch' }, 'Hoch'),
            h('option', { value: 'kritisch' }, 'Kritisch'),
          ),
        ),
        h(Input, { label: 'Frist', type: 'date', value: frist, onChange: e => setFrist(e.target.value) }),
      ),
      // AE-03: Zustaendigkeit per Dropdown. Optional \u2014 Aufgaben ohne
      // Zustaendigen sind weiterhin moeglich (z.B. zur spaeteren Zuweisung).
      h('div', { className: 'mb-4' },
        h('label', { className: 'block text-sm text-bp-muted mb-1.5' }, 'Zust\u00E4ndig (optional)'),
        h('select', {
          className: 'bp-input w-full px-4 py-3 rounded-lg text-sm',
          value: zustaendigId,
          onChange: e => setZustaendigId(e.target.value),
        },
          h('option', { value: '' }, '\u2014 niemandem zugewiesen \u2014'),
          benutzer.map(b => h('option', { key: b.id, value: b.id }, b.anzeige_name)),
        ),
      ),
      h('div', { className: 'flex gap-3' },
        h('button', { type: 'submit', className: 'bp-btn px-6 py-2.5 rounded-lg text-sm', disabled: loading }, loading ? 'Wird erstellt...' : 'Aufgabe erstellen'),
        h('button', { type: 'button', className: 'bp-btn-outline px-6 py-2.5 rounded-lg text-sm', onClick: onClose }, 'Abbrechen'),
      ),
    ),
  )
}

// ================================================================
// AUFGABE DETAIL mit Kommentaren
// ================================================================

function AufgabeDetail({ id, onBack }) {
  const { token } = useAuth()
  const [aufgabe, setAufgabe] = useState(null)
  const [kommentar, setKommentar] = useState('')
  const [err, setErr] = useState('')
  const [loading, setLoading] = useState(true)

  const laden = useCallback(async () => {
    try {
      const r = await bpApi(`/aufgaben/${id}`, { token })
      setAufgabe(r)
    } catch (e) { setErr(e.detail) }
    setLoading(false)
  }, [id, token])

  useEffect(() => { laden() }, [laden])

  const statusWechsel = async (neuerStatus) => {
    try {
      await bpApi(`/aufgaben/${id}`, { method: 'PATCH', body: { status: neuerStatus }, token })
      laden()
    } catch (e) { setErr(e.detail) }
  }

  const kommentarSenden = async (e) => {
    e.preventDefault()
    if (!kommentar.trim()) return
    try {
      await bpApi(`/aufgaben/${id}/kommentar`, { method: 'POST', body: { inhalt: kommentar }, token })
      setKommentar(''); laden()
    } catch (e) { setErr(e.detail) }
  }

  if (loading) return h('p', { className: 'text-bp-muted py-8 text-center' }, 'Laden...')
  if (!aufgabe) return h('p', { className: 'text-red-400 py-8 text-center' }, err || 'Nicht gefunden')

  const p = PRIO_FARBEN[aufgabe.prioritaet] || PRIO_FARBEN.mittel

  return h('div', { className: 'fade-in' },
    // Zurueck-Button
    h('button', { className: 'text-sm text-bp-muted hover:text-bp-400 mb-4 flex items-center gap-1', onClick: onBack },
      '\u2190 Zur\u00FCck zur Liste'),
    // Header
    h('div', { className: `${p.bg} border ${p.border} rounded-xl p-6 mb-4` },
      h('div', { className: 'flex items-center gap-3 mb-2' },
        h('span', { className: `w-3 h-3 rounded-full ${p.dot}` }),
        h('span', { className: 'font-mono text-bp-muted text-sm' }, aufgabe.nummer),
        h('span', { className: `text-xs px-2 py-0.5 rounded ${p.text}` }, aufgabe.prioritaet),
        h('span', { className: 'text-xs px-2 py-1 rounded bg-bp-card text-bp-muted' }, STATUS_LABELS[aufgabe.status]),
      ),
      h('h2', { className: 'text-lg font-semibold text-white mb-2' }, aufgabe.gegenstand),
      aufgabe.beschreibung && h('p', { className: 'text-sm text-gray-300 mb-3' }, aufgabe.beschreibung),
      h('div', { className: 'flex flex-wrap gap-4 text-xs text-bp-muted' },
        aufgabe.delegiert_von_name && h('span', null, 'Erstellt von: ', aufgabe.delegiert_von_name),
        aufgabe.zustaendig_name && h('span', null, 'Zustaendig: ', aufgabe.zustaendig_name),
        aufgabe.frist && h('span', null, 'Frist: ', new Date(aufgabe.frist).toLocaleDateString('de-DE')),
        aufgabe.erstellt_am && h('span', null, 'Erstellt: ', new Date(aufgabe.erstellt_am).toLocaleString('de-DE')),
      ),
      // Dreiklang (G3)
      (aufgabe.kosten_eur || aufgabe.zeit_arbeitstage || aufgabe.qualitaet_bewertung) &&
        h('div', { className: 'flex gap-4 mt-3 pt-3 border-t border-white/10 text-xs' },
          aufgabe.kosten_eur != null && h('span', { className: 'text-bp-400' }, `K: ${aufgabe.kosten_eur.toLocaleString('de-DE')} \u20AC`),
          aufgabe.zeit_arbeitstage != null && h('span', { className: 'text-bp-400' }, `Z: ${aufgabe.zeit_arbeitstage} AT`),
          aufgabe.qualitaet_bewertung && h('span', { className: 'text-bp-400' }, `Q: ${aufgabe.qualitaet_bewertung}`),
        ),
    ),
    // Status-Aktionen
    h('div', { className: 'flex gap-2 mb-4 flex-wrap' },
      aufgabe.status === 'offen' && h('button', { className: 'bp-btn px-4 py-2 rounded-lg text-xs', onClick: () => statusWechsel('in_bearbeitung') }, 'In Bearbeitung nehmen'),
      aufgabe.status === 'in_bearbeitung' && h('button', { className: 'bp-btn px-4 py-2 rounded-lg text-xs', onClick: () => statusWechsel('geprueft') }, 'Zur Pr\u00FCfung vorlegen'),
      aufgabe.status === 'geprueft' && h('button', { className: 'bp-btn px-4 py-2 rounded-lg text-xs', onClick: () => statusWechsel('abgeschlossen') }, 'Abschliessen'),
      aufgabe.status === 'geprueft' && h('button', { className: 'bp-btn-outline px-4 py-2 rounded-lg text-xs', onClick: () => statusWechsel('offen') }, 'Zur\u00FCckspielen'),
      !['abgeschlossen','storniert'].includes(aufgabe.status) && h('button', { className: 'bp-btn-outline px-4 py-2 rounded-lg text-xs text-red-400 border-red-800 hover:border-red-600', onClick: () => statusWechsel('storniert') }, 'Stornieren'),
    ),
    err && h(Alert, { type: 'error' }, err),
    // Kommentare als Timeline (QW-03)
    h(Card, null,
      h('h3', { className: 'text-sm font-semibold text-bp-muted uppercase tracking-wider mb-4' }, `Aufgabenhistorie (${aufgabe.kommentare?.length || 0})`),
      aufgabe.kommentare?.length > 0
        ? h('div', { className: 'relative mb-4 pl-6', style: { borderLeft: '2px solid rgba(245,158,11,0.25)' } },
            aufgabe.kommentare.map((k, idx) =>
              h('div', { key: k.id, className: 'relative pb-4' + (idx === aufgabe.kommentare.length - 1 ? ' pb-0' : '') },
                // Timeline-Punkt
                h('div', { className: 'absolute', style: { left: '-23px', top: '4px', width: '10px', height: '10px', borderRadius: '50%', background: idx === 0 ? '#f59e0b' : '#374151', border: '2px solid #f59e0b' } }),
                // Inhalt
                h('div', { className: 'bg-bp-dark rounded-lg p-3' },
                  h('div', { className: 'flex justify-between items-center text-xs text-bp-muted mb-1.5' },
                    h('span', { className: 'inline-flex items-center gap-1.5' },
                      h('span', { style: { display: 'inline-block', width: '6px', height: '6px', borderRadius: '50%', background: '#f59e0b' } }),
                      h('span', { className: 'font-medium text-white' }, k.autor_name),
                    ),
                    h('span', null, new Date(k.erstellt_am).toLocaleString('de-DE')),
                  ),
                  h('p', { className: 'text-sm text-gray-300' }, k.inhalt),
                ),
              )
            ),
          )
        : h('p', { className: 'text-sm text-bp-muted mb-4' }, 'Noch keine Eintr\u00E4ge.'),
      // Kommentar-Formular
      h('form', { onSubmit: kommentarSenden, className: 'flex gap-2' },
        h('input', { className: 'bp-input flex-1 px-4 py-2 rounded-lg text-sm', value: kommentar, onChange: e => setKommentar(e.target.value), placeholder: 'Kommentar schreiben...' }),
        h('button', { type: 'submit', className: 'bp-btn px-4 py-2 rounded-lg text-sm', disabled: !kommentar.trim() }, 'Senden'),
      ),
    ),
  )
}

function InfoRow({ label, value }) {
  return h('div', { className: 'flex justify-between text-sm' },
    h('span', { className: 'text-bp-muted' }, label),
    h('span', { className: 'text-white' }, value),
  )
}

function PasswordChange() {
  const { token, logout } = useAuth()
  const [cur, setCur] = useState('')
  const [neu, setNeu] = useState('')
  const [err, setErr] = useState('')
  const [ok, setOk] = useState(false)
  const [loading, setLoading] = useState(false)

  const submit = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true)
    try {
      await api('/passwort', { method: 'POST', body: { aktuelles_passwort: cur, neues_passwort: neu }, token })
      setOk(true); setTimeout(logout, 2000)
    } catch (e) { setErr(e.detail) }
    setLoading(false)
  }

  if (ok) return h(Alert, { type: 'success' }, 'Passwort geändert. Sie werden abgemeldet...')

  return h('form', { onSubmit: submit, className: 'mt-3 space-y-3 fade-in' },
    h(Alert, { type: 'error' }, err),
    h('input', { className: 'bp-input w-full px-3 py-2 rounded text-sm', type: 'password', placeholder: 'Aktuelles Passwort', value: cur, onChange: e => setCur(e.target.value), required: true }),
    h('input', { className: 'bp-input w-full px-3 py-2 rounded text-sm', type: 'password', placeholder: 'Neues Passwort (mind. 12 Zeichen)', value: neu, onChange: e => setNeu(e.target.value), required: true, minLength: 12 }),
    h(Button, { type: 'submit', disabled: loading }, loading ? '...' : 'Ändern'),
  )
}

function EinladungForm({ token }) {
  const [show, setShow] = useState(false)
  const [email, setEmail] = useState('')
  const [rolle, setRolle] = useState('leser')
  const [result, setResult] = useState(null)
  const [err, setErr] = useState('')
  const [loading, setLoading] = useState(false)

  if (!show) return h('div', { className: 'mt-3' },
    h(Button, { outline: true, onClick: () => setShow(true) }, 'Benutzer einladen'))

  const submit = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true)
    try {
      const r = await api('/einladung', { method: 'POST', body: { email, rolle, mandant_slug: 'tlbv', projekt_kurz: 'SYS' }, token })
      setResult(r)
    } catch (e) { setErr(e.detail) }
    setLoading(false)
  }

  if (result) return h('div', { className: 'mt-3 fade-in' },
    h(Alert, { type: 'success' }, `Einladung für ${result.email} erstellt.`),
    h('div', { className: 'bg-bp-dark rounded-lg p-3' },
      h('p', { className: 'text-xs text-bp-muted mb-1' }, 'Einladungscode (einmalig):'),
      h('p', { className: 'font-mono text-xs text-bp-400 break-all select-all' }, result.einladungs_token),
      h('p', { className: 'text-xs text-bp-muted mt-2' }, `Gültig bis: ${new Date(result.ablauf).toLocaleString('de-DE')}`),
    ),
    h(Button, { outline: true, className: 'mt-3', onClick: () => { setResult(null); setEmail(''); setShow(false) } }, 'Fertig'),
  )

  return h('form', { onSubmit: submit, className: 'mt-3 space-y-3 fade-in' },
    h(Alert, { type: 'error' }, err),
    h('input', { className: 'bp-input w-full px-3 py-2 rounded text-sm', type: 'email', placeholder: 'E-Mail des Eingeladenen', value: email, onChange: e => setEmail(e.target.value), required: true }),
    h('select', { className: 'bp-input w-full px-3 py-2 rounded text-sm', value: rolle, onChange: e => setRolle(e.target.value) },
      h('option', { value: 'leser' }, 'Leser'),
      h('option', { value: 'bauleiter' }, 'Bauleiter'),
      h('option', { value: 'fachplaner' }, 'Fachplaner'),
      h('option', { value: 'objektueberwacher' }, 'Objektueberwacher'),
      h('option', { value: 'projektleiter' }, 'Projektleiter'),
      h('option', { value: 'admin' }, 'Admin'),
    ),
    h(Button, { type: 'submit', disabled: loading }, loading ? '...' : 'Einladung senden'),
    h('button', { type: 'button', className: 'text-xs text-bp-muted hover:text-bp-400 w-full text-center', onClick: () => setShow(false) }, 'Abbrechen'),
  )
}

// ================================================================
// APP
// ================================================================

function App() {
  return h(AuthProvider, null, h(Router))
}

function Router() {
  const { phase } = useAuth()
  switch (phase) {
    case 'loading': return h('div', { className: 'min-h-screen flex items-center justify-center' },
      h('div', { className: 'text-bp-muted animate-pulse' }, 'Laden...'))
    case 'login': return h(LoginPage)
    case 'totp_verify': return h(TotpVerifyPage)
    case 'totp_setup': return h(TotpSetupPage)
    case 'dashboard': return h(DashboardPage)
    default: return h(LoginPage)
  }
}

createRoot(document.getElementById('root')).render(h(App))
</script>
</body>
