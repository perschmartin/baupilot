const API = '/api/v1/auth'
const API_BASE = '/api/v1'

// ================================================================
// Silent Token Refresh (QW-01)
// Verhindert Session-Ablauf nach 15min. Refresh-Token gilt 7 Tage.
// Bei 401 wird automatisch ein neues Access-Token geholt und der
// Request wiederholt. Concurrent Refreshes werden dedupliziert.
// ================================================================
let _refreshPromise = null

async function doRefreshToken() {
  if (_refreshPromise) return _refreshPromise
  _refreshPromise = (async () => {
    try {
      const rt = sessionStorage.getItem('bp_refresh')
      if (!rt) throw new Error('Kein Refresh-Token')
      const res = await fetch(`${API}/refresh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: rt }),
      })
      if (!res.ok) throw new Error('Refresh fehlgeschlagen')
      const data = await res.json()
      sessionStorage.setItem('bp_token', data.access_token)
      sessionStorage.setItem('bp_refresh', data.refresh_token)
      // AuthProvider ueber neuen Token informieren
      window.dispatchEvent(new CustomEvent('bp_token_refreshed', {
        detail: { access_token: data.access_token, refresh_token: data.refresh_token }
      }))
      return data.access_token
    } catch (e) {
      // Refresh fehlgeschlagen — Session beenden
      sessionStorage.removeItem('bp_token')
      sessionStorage.removeItem('bp_refresh')
      window.dispatchEvent(new CustomEvent('bp_token_expired'))
      throw e
    } finally {
      _refreshPromise = null
    }
  })()
  return _refreshPromise
}

async function api(path, opts = {}) {
  const { method = 'GET', body, token, _retried } = opts
  const headers = { 'Content-Type': 'application/json' }
  const activeToken = token || sessionStorage.getItem('bp_token')
  if (activeToken) headers['Authorization'] = `Bearer ${activeToken}`
  const res = await fetch(`${API}${path}`, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) {
    // Bei 401: einmal Refresh versuchen, dann Request wiederholen
    if (res.status === 401 && !_retried && activeToken) {
      try {
        const newToken = await doRefreshToken()
        return api(path, { ...opts, token: newToken, _retried: true })
      } catch { /* Refresh fehlgeschlagen, Original-Fehler werfen */ }
    }
    throw { status: res.status, detail: data.detail || 'Unbekannter Fehler' }
  }
  return data
}

async function bpApi(path, opts = {}) {
  const { method = 'GET', body, token, _retried } = opts
  const headers = { 'Content-Type': 'application/json' }
  const activeToken = token || sessionStorage.getItem('bp_token')
  if (activeToken) headers['Authorization'] = `Bearer ${activeToken}`
  const res = await fetch(`${API_BASE}${path}`, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) {
    if (res.status === 401 && !_retried && activeToken) {
      try {
        const newToken = await doRefreshToken()
        return bpApi(path, { ...opts, token: newToken, _retried: true })
      } catch { /* Refresh fehlgeschlagen */ }
    }
    throw { status: res.status, detail: data.detail || 'Unbekannter Fehler' }
  }
  return data
}

// bpUpload — Datei-Upload via FormData (multipart), mit Silent Token Refresh.
// Bei 401 wird einmal ein Refresh-Call ausgeloest und der Upload mit neuem Token wiederholt.
// FormData wird unveraendert wiederverwendet — der Body wird im fetch-Aufruf nur ein
// einziges Mal serialisiert, daher ist die Wiederverwendung zwischen den beiden
// fetch-Aufrufen unkritisch (verifiziert in Sandbox-Test T2).
// Der Parameter _retried verhindert eine Endlosschleife, falls auch nach Refresh
// ein 401 zurueckkommt (zB Account-Sperre direkt nach Refresh — Test T7).
async function bpUpload(path, formData, token, _retried) {
  const headers = {}
  // Token-Quelle: expliziter Parameter > sessionStorage. So funktioniert der Helper
  // auch in Komponenten, die den Token noch nicht via Auth-Hook bezogen haben.
  const activeToken = token || sessionStorage.getItem('bp_token')
  if (activeToken) headers['Authorization'] = `Bearer ${activeToken}`
  const res = await fetch(`${API_BASE}${path}`, {
    method: 'POST', headers, body: formData,
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) {
    // 401 + noch kein Retry-Versuch + Token war ueberhaupt gesetzt → Silent Refresh.
    if (res.status === 401 && !_retried && activeToken) {
      try {
        const newToken = await doRefreshToken()
        // Gleiche FormData, neuer Token, _retried=true → maximal 1 weiterer Versuch.
        return bpUpload(path, formData, newToken, true)
      } catch { /* Refresh fehlgeschlagen — doRefreshToken hat bp_token_expired gefeuert */ }
    }
    throw { status: res.status, detail: data.detail || 'Upload fehlgeschlagen' }
  }
  return data
}

// bpDownload — Datei-Download als Blob, mit Silent Token Refresh.
// Wird aktuell von handleDownload in DokumenteSeite genutzt; ist bewusst generisch
// gehalten, damit kuenftige Download-Endpoints (AP 2.5 Protokoll-PDF, LV-Exporte etc.)
// denselben Refresh-Pfad bekommen.
// Gibt den rohen Blob zurueck — der Aufrufer kuemmert sich um Dateiname und
// Browser-Download-Trick (URL.createObjectURL + a.click()).
async function bpDownload(path, opts = {}) {
  const { method = 'GET', token, _retried } = opts
  const headers = {}
  const activeToken = token || sessionStorage.getItem('bp_token')
  if (activeToken) headers['Authorization'] = `Bearer ${activeToken}`
  const res = await fetch(`${API_BASE}${path}`, { method, headers })
  if (!res.ok) {
    if (res.status === 401 && !_retried && activeToken) {
      try {
        const newToken = await doRefreshToken()
        return bpDownload(path, { ...opts, token: newToken, _retried: true })
      } catch { /* Refresh fehlgeschlagen */ }
    }
    // Fehler-Detail aus dem Body lesen — falls JSON (z.B. {detail: "..."}).
    let detail = 'Download fehlgeschlagen'
    try { const j = await res.json(); detail = j.detail || detail } catch {}
    throw { status: res.status, detail }
  }
  return await res.blob()
}

// ================================================================
// Auth Context
// ================================================================
const AuthCtx = createContext(null)

function useAuth() { return useContext(AuthCtx) }

function AuthProvider({ children }) {
  const [token, setToken] = useState(sessionStorage.getItem('bp_token'))
  const [refresh, setRefresh] = useState(sessionStorage.getItem('bp_refresh'))
  const [user, setUser] = useState(null)
  const [phase, setPhase] = useState('loading') // loading, login, totp_setup, totp_verify, register, dashboard

  const saveTokens = (t, r) => {
    setToken(t); setRefresh(r)
    if (t) sessionStorage.setItem('bp_token', t); else sessionStorage.removeItem('bp_token')
    if (r) sessionStorage.setItem('bp_refresh', r); else sessionStorage.removeItem('bp_refresh')
  }

  const logout = useCallback(() => {
    if (refresh) api('/logout', { method: 'POST', body: { refresh_token: refresh }, token }).catch(() => {})
    saveTokens(null, null); setUser(null); setPhase('login')
  }, [token, refresh])

  // QW-01: Auf Silent-Refresh-Events reagieren
  useEffect(() => {
    const onRefreshed = (e) => {
      const { access_token, refresh_token } = e.detail
      setToken(access_token)
      setRefresh(refresh_token)
    }
    const onExpired = () => {
      setToken(null); setRefresh(null); setUser(null); setPhase('login')
    }
    window.addEventListener('bp_token_refreshed', onRefreshed)
    window.addEventListener('bp_token_expired', onExpired)
    return () => {
      window.removeEventListener('bp_token_refreshed', onRefreshed)
      window.removeEventListener('bp_token_expired', onExpired)
    }
  }, [])

  // Beim Start: Token Prüfen
  useEffect(() => {
    if (!token) { setPhase('login'); return }
    api('/me', { token })
      .then(u => { setUser(u); setPhase('dashboard') })
      .catch(e => {
        if (e.status === 403 && e.detail?.includes('2FA')) setPhase('totp_setup')
        else { saveTokens(null, null); setPhase('login') }
      })
  }, [])

  return h(AuthCtx.Provider, { value: { token, refresh, user, phase, setPhase, saveTokens, setUser, logout } }, children)
}

  const cls = outline ? 'bp-btn-outline' : 'bp-btn'
  return h('button', { className: `${cls} w-full py-3 rounded-lg text-sm ${className}`, ...props }, children)

function Alert({ type = 'error', children }) {
  if (!children) return null
  const bg = type === 'error' ? 'bg-red-900/40 border-red-800 text-red-200'
    : type === 'success' ? 'bg-green-900/40 border-green-800 text-green-200'
    : 'bg-blue-900/40 border-blue-800 text-blue-200'
  return h('div', { className: `${bg} border rounded-lg px-4 py-3 text-sm mb-4 fade-in` }, children)
}

  const [email, setEmail] = useState('')

  const [err, setErr] = useState('')
  const [loading, setLoading] = useState(false)

  if (showRegister) return h(RegisterPage, { onBack: () => setShowRegister(false) })

    try {
      const r = await api('/login', { method: 'POST', body: { email, passwort: pw } })
      saveTokens(r.access_token, r.refresh_token)
      if (r.erfordert_totp_setup) setPhase('totp_setup')
      else if (r.erfordert_totp) setPhase('totp_verify')
      else {
        const u = await api('/me', { token: r.access_token })
        setUser(u); setPhase('dashboard')
      }
    } catch (e) { setErr(e.detail) }
    setLoading(false)
  }

  return h('div', { className: 'min-h-screen flex items-center justify-center px-4' },
    h('div', { className: 'w-full max-w-md' },
      h('div', { className: 'mb-8 text-center' }, h(Logo)),
      h('p', { className: 'text-sm text-bp-muted text-center mb-8 max-w-sm mx-auto leading-relaxed' },
        'Digitale Projektsteuerung für öffentliche Hochbauprojekte.'),
      h(Card, null,
        h('form', { onSubmit: submit },
          h(Alert, { type: 'error' }, err),
          h(Input, { label: 'E-Mail', type: 'email', value: email, onChange: e => setEmail(e.target.value), required: true, autoFocus: true, placeholder: 'name@behoerde.de' }),
          h(Input, { label: 'Passwort', type: 'password', value: pw, onChange: e => setPw(e.target.value), required: true, placeholder: '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022' }),
          h(Button, { type: 'submit', disabled: loading }, loading ? 'Anmelden...' : 'Anmelden'),
        ),
        h('div', { className: 'mt-4 text-center' },
          h('button', { className: 'text-sm text-bp-muted hover:text-bp-400 transition', onClick: () => setShowRegister(true) }, 'Einladungscode einlösen'),
        ),
      ),
      h(Footer),
    )
  )
}

function TotpSetupPage() {

  const [backupCodes, setBackupCodes] = useState([])
  const [err, setErr] = useState('')
  const [loading, setLoading] = useState(false)

  const startSetup = async () => {
    setLoading(true); setErr('')
    try {
      const r = await api('/totp/setup', { method: 'POST', token })
      setSetupData(r); setStep('scan')
    } catch (e) { setErr(e.detail) }
    setLoading(false)
  }

  const confirmCode = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true)
    try {
      const r = await api('/totp/confirm', { method: 'POST', body: { code }, token })

          h('p', { className: 'text-sm text-bp-muted mb-6 leading-relaxed' },
            'für den Zugang zum BauPilot ist eine Zwei-Faktor-Authentifizierung erforderlich. ',
            'Sie benötigen eine Authenticator-App (z.B. Google Authenticator, Authy oder Microsoft Authenticator).'),
          h(Alert, { type: 'error' }, err),

          setupData && h('div', { className: 'flex justify-center mb-4' },

          h('div', { className: 'bg-bp-dark rounded-lg p-3 mb-4' },
            h('p', { className: 'text-xs text-bp-muted mb-1' }, 'Oder Secret manuell eingeben:'),
            h('p', { className: 'font-mono text-sm text-bp-400 break-all select-all' }, setupData?.secret),
          ),
          h(Alert, { type: 'error' }, err),

            h('p', { className: 'text-sm text-bp-muted mb-2' }, 'Code aus der App eingeben:'),
            h('input', {
              className: 'bp-input w-full px-4 py-4 rounded-lg text-center text-2xl tracking-[0.5em] font-mono mb-4',
              type: 'text', inputMode: 'numeric', maxLength: 6, value: code,
              onChange: e => setCode(e.target.value.replace(/\D/g, '').slice(0, 6)),
              autoFocus: true, placeholder: '------',
            }),
            h(Button, { type: 'submit', disabled: loading || code.length !== 6 }, loading ? 'Prüfen...' : 'Bestaetigen'),
          ),
        ),

        // Step: backup codes
        step === 'codes' && h('div', { className: 'text-center' },

          h('p', { className: 'text-sm text-bp-muted mb-4' }, 'Backup-Codes sicher aufbewahren. Jeder Code funktioniert genau einmal.'),

const ROLLEN_FARBEN = {
  'Bauherr': 'bg-purple-900/40 text-purple-300',
  'Generalplaner': 'bg-blue-900/40 text-blue-300',
  'Generalunternehmer (extern)': 'bg-orange-900/40 text-orange-300',
  'Generalunternehmer (intern, Hochbau)': 'bg-orange-900/30 text-orange-200',
  'Generalunternehmer (intern, TGA)': 'bg-orange-900/30 text-orange-200',
  'Nutzer': 'bg-green-900/40 text-green-300',
}

function KontakteSeite() {
  const { token } = useAuth()
  const [firmen, setFirmen] = useState([])
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')
  const [expanded, setExpanded] = useState(null)
  const [detail, setDetail] = useState(null)
  const [showAdd, setShowAdd] = useState(false)

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      const r = await bpApi('/kontakte/firmen?projekt=FLI', { token })
      setFirmen(r.firmen || [])
    } catch (e) { setErr(e.detail || 'Fehler') }
    setLoading(false)
  }, [token])

  useEffect(() => { laden() }, [laden])

  const toggleDetail = async (id) => {
    if (expanded === id) { setExpanded(null); setDetail(null); return }
    try {
      const r = await bpApi(`/kontakte/firmen/${id}`, { token })
      setDetail(r); setExpanded(id)
    } catch (e) { setErr(e.detail) }
  }

  const addFirma = async (data) => {
    try {
      await bpApi('/kontakte/firmen?projekt=FLI', { method: 'POST', body: data, token })
      setShowAdd(false); laden()
    } catch (e) { setErr(e.detail) }
  }

  return h('div', { className: 'fade-in' },
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, '\u{1F3E2} Firmen & Kontakte'),
        h('p', { className: 'text-sm text-bp-muted' }, `${firmen.length} Firmen im Projekt FLI`),
      ),
      h('button', { className: 'bp-btn px-4 py-2 rounded-lg text-sm', onClick: () => setShowAdd(!showAdd) }, '+ Firma'),
    ),
    err && h(Alert, { type: 'error' }, err),
    showAdd && h(FirmaAddForm, { onSave: addFirma, onCancel: () => setShowAdd(false) }),
    loading ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Laden...')
    : firmen.length === 0 ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Keine Firmen angelegt.')
    : (() => {
        // K-01: Hierarchische Darstellung der Firmen gruppiert nach Vertragsverhaeltnis.
        // Reihenfolge spiegelt die Bauprojekt-Hierarchie wider:
        // Bauherr (BH) -> Nutzer -> Generalplaner und Fachbueros -> Generalunternehmer und Subs.
        // Eine Firma ohne Rolle landet in "Sonstige".
        const ROLLEN_REIHENFOLGE = [
          { key: 'bauherr', label: 'Bauherr', icon: '🏛️' },
          { key: 'nutzer', label: 'Nutzer', icon: '🔬' },
          { key: 'generalplaner', label: 'Generalplaner & Fachbueros', icon: '📐' },
          { key: 'fachbuero', label: 'Fachbueros (sub GP)', icon: '📐' },
          { key: 'generalunternehmer', label: 'Generalunternehmer & Subs', icon: '🏗️' },
          { key: 'subunternehmer', label: 'Subunternehmer', icon: '🏗️' },
        ]
        // Gruppieren — robust gegen unbekannte Rollen (landen in __rest)
        const groups = {}
        for (const f of firmen) {
          const k = f.rolle || '__rest'
          if (!groups[k]) groups[k] = []
          groups[k].push(f)
        }
        // In definierte Reihenfolge bringen, dann unbekannte Rollen alphabetisch
        // sortiert anhaengen, und ganz zum Schluss __rest.
        const bekannteSchluessel = ROLLEN_REIHENFOLGE.map(r => r.key)
        const unbekannte = Object.keys(groups)
          .filter(k => !bekannteSchluessel.includes(k) && k !== '__rest')
          .sort()
        const allGroups = [
          ...ROLLEN_REIHENFOLGE.filter(r => groups[r.key]?.length > 0),
          ...unbekannte.map(k => ({ key: k, label: k, icon: '🏢' })),
          ...(groups.__rest ? [{ key: '__rest', label: 'Ohne Rolle', icon: '❓' }] : []),
        ]
        // Eine wiederverwendbare Firma-Zeile als Funktion
        const renderFirmaRow = (f) => h('div', { key: f.id },
          h('div', {
            className: 'bg-bp-card border border-white/5 rounded-lg p-4 cursor-pointer hover:border-white/10 transition',
            onClick: () => toggleDetail(f.id),
          },
            h('div', { className: 'flex items-center justify-between' },
              h('div', { className: 'flex items-center gap-3' },
                h('span', { className: 'font-mono text-sm text-bp-400 w-12' }, f.kuerzel || '--'),
                h('span', { className: 'text-sm text-white font-medium' }, f.name),
                f.rolle && h('span', { className: `text-xs px-2 py-0.5 rounded ${ROLLEN_FARBEN[f.rolle] || 'bg-gray-800 text-gray-400'}` }, f.rolle),
              ),
              h('span', { className: 'text-xs text-bp-muted' }, `${f.anzahl_personen} Person${f.anzahl_personen !== 1 ? 'en' : ''}`),
            ),
          ),
          expanded === f.id && detail && h('div', { className: 'bg-bp-dark border border-white/5 rounded-b-lg p-4 -mt-1 ml-4 mr-4 fade-in' },
            detail.personen?.length > 0
              ? h('div', { className: 'space-y-2' },
                  detail.personen.map(p => h('div', { key: p.id, className: 'flex items-center justify-between text-sm' },
                    h('span', { className: 'text-white' }, `${p.vorname} ${p.nachname}`),
                    h('span', { className: 'text-bp-muted text-xs' }, p.rolle || ''),
                    p.email && h('span', { className: 'text-bp-muted text-xs' }, p.email),
                  )),
                )
              : h('p', { className: 'text-sm text-bp-muted' }, 'Keine Ansprechpartner hinterlegt.'),
          ),
        )
        return h('div', { className: 'space-y-6' },
          allGroups.map(g => h('div', { key: g.key, className: 'space-y-2' },
            // Gruppenkopf
            h('div', { className: 'flex items-center gap-2 mb-2 mt-1' },
              h('span', { className: 'text-sm' }, g.icon),
              h('h3', { className: 'text-[11px] uppercase tracking-widest text-gray-500 font-semibold' }, g.label),
              h('span', { className: 'text-[10px] text-gray-600' }, `(${(groups[g.key] || []).length})`),
              h('span', { className: 'flex-1', style: { height: '1px', background: 'linear-gradient(90deg, rgba(255,255,255,0.08), transparent)', marginLeft: '8px' } }),
            ),
            // Firmenzeilen innerhalb der Gruppe alphabetisch nach Name
            (groups[g.key] || []).slice().sort((a, b) => (a.name || '').localeCompare(b.name || '', 'de')).map(renderFirmaRow),
          )),
        )
      })(),
  )
}

// VORGAENGE-SEITE (Nachtraege, Behinderungen, Bedenken, Maengel)

const TYP_CONFIG = {
  nachtrag:              { icon: '\u{1F4CB}', prefix: 'NT' },
  behinderungsanzeige:   { icon: '\u26A0\uFE0F', prefix: 'BehA' },
  bedenkenanzeige:       { icon: '\u{1F50D}', prefix: 'BED' },
  mangelanzeige:         { icon: '\u274C', prefix: 'MA' },
}

function VorgaengeSeite({ typ, label }) {
  const { token } = useAuth()
  const [vorgaenge, setVorgaenge] = useState([])
  const [gesamt, setGesamt] = useState(0)
  const [filter, setFilter] = useState('')
  const [suche, setSuche] = useState('')
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')
  // AP 2.2a: Drill-Down auf BehinderungDetail. Aktuell nur fuer
  // typ='behinderungsanzeige' aktiv; Bedenken/Maengel folgen in eigenen Etappen.
  const [selected, setSelected] = useState(null)
  const config = TYP_CONFIG[typ] || TYP_CONFIG.nachtrag

  if (selected && typ === 'behinderungsanzeige') {
    return h(BehinderungDetail, { id: selected, onBack: () => setSelected(null) })
  }
  if (selected && typ === 'bedenkenanzeige') {
    return h(BedenkenDetail, { id: selected, onBack: () => setSelected(null) })
  }
  if (selected && typ === 'mangelanzeige') {
    return h(MangelDetail, { id: selected, onBack: () => setSelected(null) })
  }

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      let q = `&typ=${typ}`
      if (filter) q += `&status=${filter}`
      if (suche) q += `&suche=${encodeURIComponent(suche)}`
      const r = await bpApi(`/vorgaenge/?projekt=FLI${q}&limit=200`, { token })
      setVorgaenge(r.vorgaenge || []); setGesamt(r.gesamt || 0)
    } catch (e) { setErr(e.detail || 'Fehler beim Laden') }
    setLoading(false)
  }, [token, filter, suche, typ])

  useEffect(() => { laden() }, [laden])

  return h('div', { className: 'fade-in' },
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, `${config.icon} ${label}`),
        h('p', { className: 'text-sm text-bp-muted' }, `${gesamt} Eintr\u00E4ge im Projekt FLI`),
      ),
    ),
    h('div', { className: 'mb-4' },
      h('input', {
        className: 'bp-input px-4 py-2 rounded-lg text-sm w-full max-w-md',
        placeholder: 'Nummer oder Gegenstand suchen...',
        value: suche, onChange: e => setSuche(e.target.value),
      }),
    ),
    h('div', { className: 'flex gap-2 mb-4 flex-wrap' },
      [['', 'Alle'], ['offen', 'Offen'], ['in_bearbeitung', 'In Bearb.'], ['abgeschlossen', 'Erledigt']].map(([v, l]) =>
        h('button', {
          key: v, onClick: () => setFilter(v),
          className: `px-3 py-1.5 rounded-lg text-xs font-medium transition ${
            filter === v ? 'bg-bp-400 text-bp-dark' : 'bg-bp-card text-bp-muted hover:text-white border border-white/5'
          }`,
        }, l)
      ),
    ),
    err && h(Alert, { type: 'error' }, err),
    loading ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Laden...')
    : vorgaenge.length === 0 ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Keine Eintr\u00E4ge gefunden.')
    : h('div', { className: 'space-y-1' },
        h('div', { className: 'grid grid-cols-12 gap-2 px-4 py-2 text-xs text-bp-muted font-medium uppercase tracking-wider' },
          h('div', { className: 'col-span-2' }, 'Nummer'),
          h('div', { className: 'col-span-8' }, 'Gegenstand'),
          h('div', { className: 'col-span-2 text-right' }, 'Status'),
        ),
        vorgaenge.map(v =>
          h('div', {
            key: v.id,
            // AP 2.2 Drill-Down: alle drei Stoerungstypen haben jetzt eine Detail-Ansicht.
            onClick: ['behinderungsanzeige', 'bedenkenanzeige', 'mangelanzeige'].includes(typ) ? () => setSelected(v.id) : undefined,
            className: 'grid grid-cols-12 gap-2 px-4 py-3 rounded-lg bg-bp-card border border-white/5 hover:border-white/10 transition items-center'
              + (['behinderungsanzeige', 'bedenkenanzeige', 'mangelanzeige'].includes(typ) ? ' cursor-pointer' : ''),
          },
            h('div', { className: 'col-span-2 font-mono text-sm text-bp-400' }, v.nummer),
            h('div', { className: 'col-span-8 text-sm text-white truncate' }, v.gegenstand),
            h('div', { className: 'col-span-2 text-right' },
              h('span', { className: `text-xs px-2 py-1 rounded ${
                v.status === 'abgeschlossen' ? 'bg-green-900/40 text-green-300' :
                v.status === 'storniert' ? 'bg-gray-800 text-gray-400' :
                v.status === 'in_bearbeitung' ? 'bg-blue-900/30 text-blue-300' :
                'bg-bp-card text-bp-muted border border-white/10'
              }` }, STATUS_LABELS[v.status] || v.status),
            ),
          )
        ),
      ),
  )
}

// ================================================================
// BEHINDERUNG-DETAIL (AP 2.2a)
// ================================================================
// 6-Schritte-Workflow analog zu Nachtraegen, aber ohne LV/Kosten/Vorlage:
//   1 Erfassung -> 2 Pruefung -> 3 Anerkennung/Rueckweisung
//   -> 4 Schriftverkehr -> 5 erneute Pruefung -> 6 Abmeldung GU.
// Schritte 3 und 6 erfordern Projektleiter/Admin (Backend pruefst die Rolle).

const BEHA_SCHRITT_LABELS = [
  'Erfassung', 'Pruefung', 'Anerkennung/Rueckweisung',
  'Schriftverkehr', 'Erneute Pruefung', 'Abmeldung GU',
]

function BehinderungDetail({ id, onBack }) {
  const { token } = useAuth()
  const [beh, setBeh] = useState(null)
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')
  const [actionLoading, setActionLoading] = useState(false)
  const [schrittKommentar, setSchrittKommentar] = useState('')

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      const r = await bpApi(`/behinderungen/${id}`, { token })
      setBeh(r)
    } catch (e) { setErr(e.detail || 'Fehler beim Laden') }
    setLoading(false)
  }, [id, token])

  useEffect(() => { laden() }, [laden])

  const schrittAbschliessen = async (nr, ergebnis) => {
    if (!ergebnis || !ergebnis.trim()) { setErr('Bitte Ergebnis eingeben.'); return }
    setActionLoading(true)
    try {
      await bpApi(`/behinderungen/${id}/schritt/${nr}`, { method: 'POST', body: { ergebnis: ergebnis.trim() }, token })
      setSchrittKommentar('')
      await laden()
    } catch (e) { setErr(e.detail || 'Fehler beim Abschluss') }
    setActionLoading(false)
  }

  if (loading) return h('p', { className: 'text-bp-muted py-8 text-center' }, 'Laden...')
  if (!beh) return h('p', { className: 'text-red-400 py-8 text-center' }, err || 'Behinderung nicht gefunden')

  // Map Schritt-Nr -> Schritt-Daten fuer schnellen Zugriff
  const schrittMap = {}
  for (const s of (beh.pruefschritte || [])) schrittMap[s.schritt] = s
  const aktuell = beh.aktueller_schritt || 0
  const naechsterSchritt = Math.min(aktuell + 1, 6)

  return h('div', { className: 'fade-in' },
    // Kopfzeile mit Back-Button
    h('div', { className: 'flex items-center gap-3 mb-4' },
      h('button', { onClick: onBack, className: 'text-xs text-bp-muted hover:text-white' }, '← Zurueck zur Liste'),
      h('span', { className: 'text-xs text-gray-600' }, '/'),
      h('span', { className: 'text-xs font-mono text-bp-400' }, beh.nummer),
    ),
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, '⚠️ ' + beh.gegenstand),
        h('p', { className: 'text-xs text-bp-muted mt-1' }, 'Behinderungsanzeige nach VOB/B §6 · Status: ' + (STATUS_LABELS[beh.status] || beh.status)),
      ),
      err && h('span', { className: 'text-xs text-red-400' }, err),
    ),
    // Zwei-Spalten-Layout: Stepper-Sidebar + Content
    h('div', { style: { display: 'grid', gridTemplateColumns: '280px 1fr', gap: '20px' } },
      // === STEPPER-SIDEBAR ===
      h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5' },
        h('h3', { className: 'text-xs uppercase tracking-widest text-gray-500 mb-4' }, 'Pruefschritte'),
        h('div', { className: 'flex flex-col gap-2' },
          BEHA_SCHRITT_LABELS.map((lbl, i) => {
            const nr = i + 1
            const s = schrittMap[nr]
            const done = s && s.abgeschlossen
            const isAktuell = nr === naechsterSchritt && !done
            // Farben: gruen=abgeschlossen, amber=aktuell, grau=ausstehend
            const dotBg = done ? '#4ade80' : isAktuell ? '#f5a623' : '#374151'
            const txtCol = done ? 'text-white' : isAktuell ? 'text-amber-300' : 'text-gray-500'
            return h('div', { key: nr, className: 'flex items-start gap-3' },
              h('div', { className: 'mt-1', style: { width: '12px', height: '12px', borderRadius: '50%', background: dotBg, border: '2px solid #1a1a1a', boxShadow: isAktuell ? '0 0 0 2px rgba(245,166,35,0.3)' : 'none' } }),
              h('div', { className: 'flex-1 min-w-0' },
                h('div', { className: `text-xs font-semibold ${txtCol}` }, `${nr}. ${lbl}`),
                s?.abgeschlossen_am && h('div', { className: 'text-[10px] text-gray-500 mt-0.5' }, new Date(s.abgeschlossen_am).toLocaleString('de-DE')),
                done && s?.ergebnis && h('div', { className: 'text-[11px] text-gray-400 mt-1 whitespace-pre-wrap' }, s.ergebnis),
              ),
            )
          }),
        ),
        // Aktions-Block: aktuellen Schritt abschliessen
        aktuell < 6 && h('div', { className: 'mt-5 pt-5 border-t border-white/5' },
          h('p', { className: 'text-[11px] text-gray-400 mb-2' }, `Schritt ${naechsterSchritt} (${BEHA_SCHRITT_LABELS[naechsterSchritt - 1]}) abschliessen:`),
          h('textarea', {
            className: 'bp-input w-full px-3 py-2 rounded-lg text-xs',
            rows: 3,
            placeholder: _placeholderFuerSchritt(naechsterSchritt),
            value: schrittKommentar,
            onChange: e => setSchrittKommentar(e.target.value),
          }),
          h('button', {
            className: 'bp-btn w-full px-3 py-2 rounded-lg text-xs mt-2',
            disabled: actionLoading || !schrittKommentar.trim(),
            onClick: () => schrittAbschliessen(naechsterSchritt, schrittKommentar),
          }, actionLoading ? 'Laeuft...' : `✓ Schritt ${naechsterSchritt} abschliessen`),
          [3, 6].includes(naechsterSchritt) && h('p', { className: 'text-[10px] text-amber-400/80 mt-2' }, '⚠ Nur Projektleitung und Admin'),
        ),
        aktuell >= 6 && h('div', { className: 'mt-5 pt-5 border-t border-white/5 rounded-lg p-3', style: { background: 'rgba(74,222,128,0.08)', border: '1px solid rgba(74,222,128,0.25)' } },
          h('div', { className: 'text-sm font-semibold text-green-300' }, '✓ Alle Schritte abgeschlossen'),
          h('p', { className: 'text-[11px] text-gray-400 mt-1' }, 'Behinderung als erledigt dokumentiert.'),
        ),
      ),
      // === CONTENT — Stammdaten + Dreiklang ===
      h('div', null,
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5 mb-4' },
          h('h3', { className: 'text-sm font-semibold text-white mb-4' }, 'Stammdaten'),
          h('div', { className: 'grid grid-cols-2 gap-3 text-xs' },
            _stamm('Nummer', beh.nummer || '—'),
            _stamm('Status', STATUS_LABELS[beh.status] || beh.status),
            _stamm('Prioritaet', beh.prioritaet || '—'),
            _stamm('Frist', beh.frist ? new Date(beh.frist).toLocaleDateString('de-DE') : '—'),
            _stamm('Erstellt am', beh.erstellt_am ? new Date(beh.erstellt_am).toLocaleString('de-DE') : '—'),
            _stamm('Erstellt von', beh.erstellt_von || '—'),
          ),
          beh.beschreibung && h('div', { className: 'mt-4 pt-4 border-t border-white/5' },
            h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1.5' }, 'Beschreibung'),
            h('p', { className: 'text-xs text-gray-300 whitespace-pre-wrap' }, beh.beschreibung),
          ),
        ),
        // Dreiklang Q/Z/K (zentrale Pflichtdimension G3)
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5' },
          h('h3', { className: 'text-sm font-semibold text-white mb-4' }, 'Dreiklang Q/Z/K'),
          h('div', { className: 'grid grid-cols-3 gap-3' },
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Qualitaet'),
              h('div', { className: 'text-sm text-white' }, beh.qualitaet_bewertung || '—'),
            ),
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Zeit'),
              h('div', { className: 'text-base font-bold font-mono text-white' },
                beh.zeit_arbeitstage != null ? `${beh.zeit_arbeitstage > 0 ? '+' : ''}${beh.zeit_arbeitstage} AT` : '—',
              ),
            ),
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Kosten'),
              h('div', { className: 'text-base font-bold font-mono text-white' },
                beh.kosten_eur != null ? EUR(beh.kosten_eur) : '—',
              ),
            ),
          ),
        ),
      ),
    ),
  )
}

// Hilfsfunktion: Stammdaten-Zelle
function _stamm(label, value) {
  return h('div', null,
    h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-0.5' }, label),
    h('div', { className: 'text-white' }, value),
  )
}

// Hilfsfunktion: Placeholder-Text passend zum aktuellen Schritt
function _placeholderFuerSchritt(nr) {
  const t = {
    1: 'Eingang dokumentieren: Wann, durch wen, mit welchen Anlagen.',
    2: 'Sachliche Pruefung: Begruendet die GU die Behinderung schluessig?',
    3: 'Anerkennung oder Rueckweisung mit fachlicher Begruendung (VOB/B §6).',
    4: 'Schriftverkehr: Wer wurde wann wie informiert?',
    5: 'Erneute Pruefung nach Schriftverkehr/Stellungnahme.',
    6: 'Abmeldung GU dokumentiert. Behinderungsphase abgeschlossen.',
  }
  return t[nr] || ''
}


// ================================================================
// BEDENKEN-DETAIL (AP 2.2b)
// ================================================================
// Gleicher 6-Schritte-Workflow wie Behinderungen (VOB/B §4 Abs. 3).
// Unterschiede zu BehinderungDetail:
//   - LV-Position-Zuordnung (lv_id) wird angezeigt
//   - gewaehrleistung_bis (DATE) ist editierbar (PATCH-Endpoint)
//   - Schritt-Placeholder-Texte sind bedenken-spezifisch (Bedenken statt
//     Behinderung — sachlich-rechtliche Argumentation gegenueber dem AG)

const BED_SCHRITT_LABELS = [
  'Erfassung', 'Pruefung', 'Anerkennung/Rueckweisung',
  'Schriftverkehr', 'Erneute Pruefung', 'Abmeldung GU',
]

function BedenkenDetail({ id, onBack }) {
  const { token } = useAuth()
  const [bed, setBed] = useState(null)
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')
  const [actionLoading, setActionLoading] = useState(false)
  const [schrittKommentar, setSchrittKommentar] = useState('')
  // Lokaler State fuer das Bearbeiten der Gewaehrleistung. Beim Wechsel
  // des Bedenken-Datensatzes setzen wir es zurueck (siehe useEffect unten).
  const [gewBis, setGewBis] = useState('')

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      const r = await bpApi(`/bedenken/${id}`, { token })
      setBed(r)
      setGewBis(r.gewaehrleistung_bis || '')
    } catch (e) { setErr(e.detail || 'Fehler beim Laden') }
    setLoading(false)
  }, [id, token])

  useEffect(() => { laden() }, [laden])

  const schrittAbschliessen = async (nr, ergebnis) => {
    if (!ergebnis || !ergebnis.trim()) { setErr('Bitte Ergebnis eingeben.'); return }
    setActionLoading(true)
    try {
      await bpApi(`/bedenken/${id}/schritt/${nr}`, { method: 'POST', body: { ergebnis: ergebnis.trim() }, token })
      setSchrittKommentar('')
      await laden()
    } catch (e) { setErr(e.detail || 'Fehler beim Abschluss') }
    setActionLoading(false)
  }

  const gewaehrleistungSpeichern = async () => {
    setActionLoading(true)
    try {
      // gewaehrleistung_bis=null entfernt das Datum; ein leeres String-Feld
      // wird als null gesendet (PATCH-Body), damit der Backend-Service das
      // Feld korrekt nullen kann.
      await bpApi(`/bedenken/${id}`, { method: 'PATCH', body: { gewaehrleistung_bis: gewBis || null }, token })
      await laden()
    } catch (e) { setErr(e.detail || 'Fehler beim Speichern der Gewaehrleistungsfrist') }
    setActionLoading(false)
  }

  if (loading) return h('p', { className: 'text-bp-muted py-8 text-center' }, 'Laden...')
  if (!bed) return h('p', { className: 'text-red-400 py-8 text-center' }, err || 'Bedenken nicht gefunden')

  const schrittMap = {}
  for (const s of (bed.pruefschritte || [])) schrittMap[s.schritt] = s
  const aktuell = bed.aktueller_schritt || 0
  const naechsterSchritt = Math.min(aktuell + 1, 6)

  return h('div', { className: 'fade-in' },
    h('div', { className: 'flex items-center gap-3 mb-4' },
      h('button', { onClick: onBack, className: 'text-xs text-bp-muted hover:text-white' }, '← Zurueck zur Liste'),
      h('span', { className: 'text-xs text-gray-600' }, '/'),
      h('span', { className: 'text-xs font-mono text-bp-400' }, bed.nummer),
    ),
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, '🔍 ' + bed.gegenstand),
        h('p', { className: 'text-xs text-bp-muted mt-1' }, 'Bedenkenanzeige nach VOB/B §4 Abs. 3 · Status: ' + (STATUS_LABELS[bed.status] || bed.status)),
      ),
      err && h('span', { className: 'text-xs text-red-400' }, err),
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: '280px 1fr', gap: '20px' } },
      // === STEPPER-SIDEBAR ===
      h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5' },
        h('h3', { className: 'text-xs uppercase tracking-widest text-gray-500 mb-4' }, 'Pruefschritte'),
        h('div', { className: 'flex flex-col gap-2' },
          BED_SCHRITT_LABELS.map((lbl, i) => {
            const nr = i + 1
            const s = schrittMap[nr]
            const done = s && s.abgeschlossen
            const isAktuell = nr === naechsterSchritt && !done
            const dotBg = done ? '#4ade80' : isAktuell ? '#f5a623' : '#374151'
            const txtCol = done ? 'text-white' : isAktuell ? 'text-amber-300' : 'text-gray-500'
            return h('div', { key: nr, className: 'flex items-start gap-3' },
              h('div', { className: 'mt-1', style: { width: '12px', height: '12px', borderRadius: '50%', background: dotBg, border: '2px solid #1a1a1a', boxShadow: isAktuell ? '0 0 0 2px rgba(245,166,35,0.3)' : 'none' } }),
              h('div', { className: 'flex-1 min-w-0' },
                h('div', { className: `text-xs font-semibold ${txtCol}` }, `${nr}. ${lbl}`),
                s?.abgeschlossen_am && h('div', { className: 'text-[10px] text-gray-500 mt-0.5' }, new Date(s.abgeschlossen_am).toLocaleString('de-DE')),
                done && s?.ergebnis && h('div', { className: 'text-[11px] text-gray-400 mt-1 whitespace-pre-wrap' }, s.ergebnis),
              ),
            )
          }),
        ),
        aktuell < 6 && h('div', { className: 'mt-5 pt-5 border-t border-white/5' },
          h('p', { className: 'text-[11px] text-gray-400 mb-2' }, `Schritt ${naechsterSchritt} (${BED_SCHRITT_LABELS[naechsterSchritt - 1]}) abschliessen:`),
          h('textarea', {
            className: 'bp-input w-full px-3 py-2 rounded-lg text-xs',
            rows: 3,
            placeholder: _bedPlaceholder(naechsterSchritt),
            value: schrittKommentar,
            onChange: e => setSchrittKommentar(e.target.value),
          }),
          h('button', {
            className: 'bp-btn w-full px-3 py-2 rounded-lg text-xs mt-2',
            disabled: actionLoading || !schrittKommentar.trim(),
            onClick: () => schrittAbschliessen(naechsterSchritt, schrittKommentar),
          }, actionLoading ? 'Laeuft...' : `✓ Schritt ${naechsterSchritt} abschliessen`),
          [3, 6].includes(naechsterSchritt) && h('p', { className: 'text-[10px] text-amber-400/80 mt-2' }, '⚠ Nur Projektleitung und Admin'),
        ),
        aktuell >= 6 && h('div', { className: 'mt-5 pt-5 border-t border-white/5 rounded-lg p-3', style: { background: 'rgba(74,222,128,0.08)', border: '1px solid rgba(74,222,128,0.25)' } },
          h('div', { className: 'text-sm font-semibold text-green-300' }, '✓ Alle Schritte abgeschlossen'),
          h('p', { className: 'text-[11px] text-gray-400 mt-1' }, 'Bedenken als erledigt dokumentiert.'),
        ),
      ),
      // === CONTENT — Stammdaten + LV-Bezug + Gewaehrleistung + Dreiklang ===
      h('div', null,
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5 mb-4' },
          h('h3', { className: 'text-sm font-semibold text-white mb-4' }, 'Stammdaten'),
          h('div', { className: 'grid grid-cols-2 gap-3 text-xs' },
            _stamm('Nummer', bed.nummer || '—'),
            _stamm('Status', STATUS_LABELS[bed.status] || bed.status),
            _stamm('Prioritaet', bed.prioritaet || '—'),
            _stamm('Frist', bed.frist ? new Date(bed.frist).toLocaleDateString('de-DE') : '—'),
            // AP 2.2b: LV-Zuordnung sichtbar machen — Volltext in spaeteren Etappen.
            _stamm('LV-Bezug', bed.lv_id ? bed.lv_id.toString().substring(0, 8) + '…' : '— keine Zuordnung'),
            _stamm('Erstellt am', bed.erstellt_am ? new Date(bed.erstellt_am).toLocaleString('de-DE') : '—'),
          ),
          bed.beschreibung && h('div', { className: 'mt-4 pt-4 border-t border-white/5' },
            h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1.5' }, 'Beschreibung'),
            h('p', { className: 'text-xs text-gray-300 whitespace-pre-wrap' }, bed.beschreibung),
          ),
        ),
        // Gewaehrleistungsfrist (editierbar) — bedenken-spezifisch, Migration 008.
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5 mb-4' },
          h('h3', { className: 'text-sm font-semibold text-white mb-2' }, 'Gewaehrleistungsfrist'),
          h('p', { className: 'text-[11px] text-gray-500 mb-3' }, 'Wenn das Bedenken nicht ausgeraeumt wird und der GU trotzdem ausfuehrt, verlaengert oder begrenzt sich die Gewaehrleistung. Hier das relevante Datum hinterlegen.'),
          h('div', { className: 'flex items-end gap-2' },
            h('input', {
              type: 'date',
              className: 'bp-input px-3 py-2 rounded-lg text-xs',
              value: gewBis || '',
              onChange: e => setGewBis(e.target.value),
            }),
            h('button', {
              className: 'bp-btn px-3 py-2 rounded-lg text-xs',
              disabled: actionLoading,
              onClick: gewaehrleistungSpeichern,
            }, actionLoading ? '…' : '💾 Speichern'),
            bed.gewaehrleistung_bis && h('span', { className: 'text-[11px] text-gray-400' }, 'aktuell: ' + new Date(bed.gewaehrleistung_bis).toLocaleDateString('de-DE')),
          ),
        ),
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5' },
          h('h3', { className: 'text-sm font-semibold text-white mb-4' }, 'Dreiklang Q/Z/K'),
          h('div', { className: 'grid grid-cols-3 gap-3' },
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Qualitaet'),
              h('div', { className: 'text-sm text-white' }, bed.qualitaet_bewertung || '—'),
            ),
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Zeit'),
              h('div', { className: 'text-base font-bold font-mono text-white' },
                bed.zeit_arbeitstage != null ? `${bed.zeit_arbeitstage > 0 ? '+' : ''}${bed.zeit_arbeitstage} AT` : '—',

            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Kosten'),
              h('div', { className: 'text-base font-bold font-mono text-white' },
                bed.kosten_eur != null ? EUR(bed.kosten_eur) : '—',
              ),
            ),
          ),
        ),
      ),
    ),
  )
}

// Hilfsfunktion: bedenken-spezifischer Placeholder pro Schritt.
function _bedPlaceholder(nr) {
  const t = {
    1: 'Eingang des Bedenkens dokumentieren. Wer, wann, welche Anlagen.',
    2: 'Sachlich-fachliche Pruefung des Bedenkens. Ist der Einwand begruendet?',
    3: 'Anerkennung des Bedenkens oder Rueckweisung mit Begruendung (VOB/B §4 Abs. 3).',
    4: 'Schriftverkehr und Stellungnahmen dokumentieren.',
    5: 'Erneute Pruefung nach Schriftverkehr/Klarstellung.',
    6: 'Abmeldung des Bedenkens. Beweissicherung abgeschlossen.',
  }
  return t[nr] || ''
}


// ================================================================
// MANGEL-DETAIL (AP 2.2c)
// ================================================================
// 5-Schritte-Workflow nach VOB/B §13:
//   1 Erfassung -> 2 Mangelschreiben -> 3 Schriftverkehr
//   -> 4 Abmeldung GU/GP -> 5 Bestaetigung Bauherr
// Mangel-spezifisch (Migration 008):
//   - mangelart-Enum (ausfuehrungsmangel/planungsmangel/unklar)
//     bestimmt die Verantwortung: Ausfuehrung -> GU, Planung -> GP
//   - Kostenuntergliederung: nachtragsfolge_eur (NT als Folge),
//     folgekosten_betrieb_eur (laufende Betriebskosten), minderkosten_eur
//     (Minderungsanspruch).
//   - verlaengerung_monate fuer Gewaehrleistungsverlaengerung
// Leitungsschritte 2 (Mangelschreiben) und 5 (Bestaetigung) erfordern PL/Admin.

const MANGEL_SCHRITT_LABELS = [
  'Erfassung', 'Mangelschreiben', 'Schriftverkehr',
  'Abmeldung GU/GP', 'Bestaetigung Bauherr',
]

const MANGELART_LABELS = {
  ausfuehrungsmangel: 'Ausfuehrungsmangel (GU)',
  planungsmangel: 'Planungsmangel (GP)',
  unklar: 'unklar / wird geprueft',
}

function MangelDetail({ id, onBack }) {
  const { token } = useAuth()
  const [m, setM] = useState(null)
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')
  const [actionLoading, setActionLoading] = useState(false)
  const [schrittKommentar, setSchrittKommentar] = useState('')
  // Stammdaten-Editierfelder. Werden beim Laden des Datensatzes synchronisiert.
  const [editMangelart, setEditMangelart] = useState('')
  const [editVerlaengerung, setEditVerlaengerung] = useState('')
  const [editNFolge, setEditNFolge] = useState('')
  const [editFKBetrieb, setEditFKBetrieb] = useState('')
  const [editMinder, setEditMinder] = useState('')

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      const r = await bpApi(`/maengel/${id}`, { token })
      setM(r)
      setEditMangelart(r.mangelart || '')
      setEditVerlaengerung(r.verlaengerung_monate != null ? String(r.verlaengerung_monate) : '')
      setEditNFolge(r.nachtragsfolge_eur != null ? String(r.nachtragsfolge_eur) : '')
      setEditFKBetrieb(r.folgekosten_betrieb_eur != null ? String(r.folgekosten_betrieb_eur) : '')
      setEditMinder(r.minderkosten_eur != null ? String(r.minderkosten_eur) : '')
    } catch (e) { setErr(e.detail || 'Fehler beim Laden') }
    setLoading(false)
  }, [id, token])

  useEffect(() => { laden() }, [laden])

  const schrittAbschliessen = async (nr, ergebnis) => {
    if (!ergebnis || !ergebnis.trim()) { setErr('Bitte Ergebnis eingeben.'); return }
    setActionLoading(true)
    try {
      await bpApi(`/maengel/${id}/schritt/${nr}`, { method: 'POST', body: { ergebnis: ergebnis.trim() }, token })
      setSchrittKommentar('')
      await laden()
    } catch (e) { setErr(e.detail || 'Fehler beim Abschluss') }
    setActionLoading(false)
  }

  const stammdatenSpeichern = async () => {
    // PATCH sendet nur Felder, die der Anwender ausgefuellt hat. Leere Strings
    // werden zu null bzw. nicht uebertragen — der Service-Layer beruecksichtigt
    // nur explizit gesetzte Felder.
    setActionLoading(true)
    try {
      const body = {}
      if (editMangelart) body.mangelart = editMangelart
      if (editVerlaengerung !== '') body.verlaengerung_monate = parseInt(editVerlaengerung, 10)
      if (editNFolge !== '') body.nachtragsfolge_eur = parseFloat(editNFolge)
      if (editFKBetrieb !== '') body.folgekosten_betrieb_eur = parseFloat(editFKBetrieb)
      if (editMinder !== '') body.minderkosten_eur = parseFloat(editMinder)
      await bpApi(`/maengel/${id}`, { method: 'PATCH', body, token })
      await laden()
    } catch (e) { setErr(e.detail || 'Fehler beim Speichern') }
    setActionLoading(false)
  }

  if (loading) return h('p', { className: 'text-bp-muted py-8 text-center' }, 'Laden...')
  if (!m) return h('p', { className: 'text-red-400 py-8 text-center' }, err || 'Mangel nicht gefunden')

  const schrittMap = {}
  for (const s of (m.pruefschritte || [])) schrittMap[s.schritt] = s
  const aktuell = m.aktueller_schritt || 0
  const naechsterSchritt = Math.min(aktuell + 1, 5)
  // Verantwortungs-Anzeige aus Mangelart abgeleitet
  const verantwort = m.mangelart === 'ausfuehrungsmangel' ? 'Generalunternehmer (GU/AGE)'
    : m.mangelart === 'planungsmangel' ? 'Generalplaner (GP/BWP)' : '—'

  return h('div', { className: 'fade-in' },
    h('div', { className: 'flex items-center gap-3 mb-4' },
      h('button', { onClick: onBack, className: 'text-xs text-bp-muted hover:text-white' }, '← Zurueck zur Liste'),
      h('span', { className: 'text-xs text-gray-600' }, '/'),
      h('span', { className: 'text-xs font-mono text-bp-400' }, m.nummer),
    ),
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, '❌ ' + m.gegenstand),
        h('p', { className: 'text-xs text-bp-muted mt-1' }, 'Mangelanzeige nach VOB/B §13 · Status: ' + (STATUS_LABELS[m.status] || m.status)),
      ),
      err && h('span', { className: 'text-xs text-red-400' }, err),
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: '280px 1fr', gap: '20px' } },
      // === STEPPER-SIDEBAR (5 Schritte) ===
      h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5' },
        h('h3', { className: 'text-xs uppercase tracking-widest text-gray-500 mb-4' }, 'Pruefschritte (5)'),
        h('div', { className: 'flex flex-col gap-2' },
          MANGEL_SCHRITT_LABELS.map((lbl, i) => {
            const nr = i + 1
            const s = schrittMap[nr]
            const done = s && s.abgeschlossen
            const isAktuell = nr === naechsterSchritt && !done
            const dotBg = done ? '#4ade80' : isAktuell ? '#f5a623' : '#374151'
            const txtCol = done ? 'text-white' : isAktuell ? 'text-amber-300' : 'text-gray-500'
            return h('div', { key: nr, className: 'flex items-start gap-3' },
              h('div', { className: 'mt-1', style: { width: '12px', height: '12px', borderRadius: '50%', background: dotBg, border: '2px solid #1a1a1a', boxShadow: isAktuell ? '0 0 0 2px rgba(245,166,35,0.3)' : 'none' } }),
              h('div', { className: 'flex-1 min-w-0' },
                h('div', { className: `text-xs font-semibold ${txtCol}` }, `${nr}. ${lbl}`),
                s?.abgeschlossen_am && h('div', { className: 'text-[10px] text-gray-500 mt-0.5' }, new Date(s.abgeschlossen_am).toLocaleString('de-DE')),
                done && s?.ergebnis && h('div', { className: 'text-[11px] text-gray-400 mt-1 whitespace-pre-wrap' }, s.ergebnis),
              ),
            )
          }),
        ),
        aktuell < 5 && h('div', { className: 'mt-5 pt-5 border-t border-white/5' },
          h('p', { className: 'text-[11px] text-gray-400 mb-2' }, `Schritt ${naechsterSchritt} (${MANGEL_SCHRITT_LABELS[naechsterSchritt - 1]}) abschliessen:`),
          h('textarea', {
            className: 'bp-input w-full px-3 py-2 rounded-lg text-xs',
            rows: 3,
            placeholder: _mangelPlaceholder(naechsterSchritt),
            value: schrittKommentar,
            onChange: e => setSchrittKommentar(e.target.value),
          }),
          h('button', {
            className: 'bp-btn w-full px-3 py-2 rounded-lg text-xs mt-2',
            disabled: actionLoading || !schrittKommentar.trim(),
            onClick: () => schrittAbschliessen(naechsterSchritt, schrittKommentar),
          }, actionLoading ? 'Laeuft...' : `✓ Schritt ${naechsterSchritt} abschliessen`),
          [2, 5].includes(naechsterSchritt) && h('p', { className: 'text-[10px] text-amber-400/80 mt-2' }, '⚠ Nur Projektleitung und Admin'),
        ),
        aktuell >= 5 && h('div', { className: 'mt-5 pt-5 border-t border-white/5 rounded-lg p-3', style: { background: 'rgba(74,222,128,0.08)', border: '1px solid rgba(74,222,128,0.25)' } },
          h('div', { className: 'text-sm font-semibold text-green-300' }, '✓ Mangelvorgang abgeschlossen'),
        ),
      ),
      // === CONTENT ===
      h('div', null,
        // Stammdaten + Verantwortung
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5 mb-4' },
          h('h3', { className: 'text-sm font-semibold text-white mb-4' }, 'Stammdaten'),
          h('div', { className: 'grid grid-cols-2 gap-3 text-xs' },
            _stamm('Nummer', m.nummer || '—'),
            _stamm('Status', STATUS_LABELS[m.status] || m.status),
            _stamm('Mangelart', m.mangelart ? MANGELART_LABELS[m.mangelart] || m.mangelart : '— nicht zugeordnet'),
            _stamm('Verantwortung', verantwort),
            _stamm('Gewaehrleistung +Monate', m.verlaengerung_monate != null ? `+${m.verlaengerung_monate}` : '—'),
            _stamm('Frist', m.frist ? new Date(m.frist).toLocaleDateString('de-DE') : '—'),
          ),
          m.beschreibung && h('div', { className: 'mt-4 pt-4 border-t border-white/5' },
            h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1.5' }, 'Beschreibung'),
            h('p', { className: 'text-xs text-gray-300 whitespace-pre-wrap' }, m.beschreibung),
          ),
        ),
        // Klassifikation + Kostenuntergliederung (editierbar)
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5 mb-4' },
          h('h3', { className: 'text-sm font-semibold text-white mb-3' }, 'Klassifikation & Kostenuntergliederung'),
          h('p', { className: 'text-[11px] text-gray-500 mb-3' }, 'Mangelart bestimmt die Verantwortung. Die drei Kostenarten zeigen die finanzielle Auswirkung getrennt nach Quelle.'),
          h('div', { className: 'grid grid-cols-2 gap-3' },
            h('div', null,
              h('label', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1 block' }, 'Mangelart'),
              h('select', {
                className: 'bp-input w-full px-3 py-2 rounded-lg text-xs',
                value: editMangelart,
                onChange: e => setEditMangelart(e.target.value),
              },
                h('option', { value: '' }, '— bitte wählen —'),
                h('option', { value: 'ausfuehrungsmangel' }, 'Ausfuehrungsmangel (GU)'),
                h('option', { value: 'planungsmangel' }, 'Planungsmangel (GP)'),
                h('option', { value: 'unklar' }, 'unklar / wird geprueft'),
              ),
            ),
            h('div', null,
              h('label', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1 block' }, 'Gewaehrleistung +Monate'),
              h('input', { type: 'number', min: 0, className: 'bp-input w-full px-3 py-2 rounded-lg text-xs', value: editVerlaengerung, onChange: e => setEditVerlaengerung(e.target.value), placeholder: '0' }),
            ),
            h('div', null,
              h('label', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1 block' }, 'Nachtragsfolge EUR'),
              h('input', { type: 'number', step: '0.01', className: 'bp-input w-full px-3 py-2 rounded-lg text-xs', value: editNFolge, onChange: e => setEditNFolge(e.target.value), placeholder: 'z.B. 12500' }),
            ),
            h('div', null,
              h('label', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1 block' }, 'Folgekosten Betrieb EUR'),
              h('input', { type: 'number', step: '0.01', className: 'bp-input w-full px-3 py-2 rounded-lg text-xs', value: editFKBetrieb, onChange: e => setEditFKBetrieb(e.target.value), placeholder: 'z.B. 8000' }),
            ),
            h('div', { className: 'col-span-2' },
              h('label', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1 block' }, 'Minderkosten EUR'),
              h('input', { type: 'number', step: '0.01', className: 'bp-input w-full px-3 py-2 rounded-lg text-xs', value: editMinder, onChange: e => setEditMinder(e.target.value), placeholder: 'Minderungsanspruch' }),
            ),
          ),
          h('button', { className: 'bp-btn px-4 py-2 rounded-lg text-xs mt-3', disabled: actionLoading, onClick: stammdatenSpeichern },
            actionLoading ? '…' : '💾 Stammdaten speichern',
          ),
        ),
        // Dreiklang
        h('div', { className: 'bg-bp-card border border-white/5 rounded-2xl p-5' },
          h('h3', { className: 'text-sm font-semibold text-white mb-4' }, 'Dreiklang Q/Z/K'),
          h('div', { className: 'grid grid-cols-3 gap-3' },
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Qualitaet'),
              h('div', { className: 'text-sm text-white' }, m.qualitaet_bewertung || '—'),
            ),
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Zeit'),
              h('div', { className: 'text-base font-bold font-mono text-white' },
                m.zeit_arbeitstage != null ? `${m.zeit_arbeitstage > 0 ? '+' : ''}${m.zeit_arbeitstage} AT` : '—',
              ),
            ),
            h('div', { className: 'bg-white/[.02] rounded-xl p-4 border border-white/5' },
              h('div', { className: 'text-[10px] text-gray-500 uppercase tracking-widest mb-1' }, 'Kosten gesamt'),
              h('div', { className: 'text-base font-bold font-mono text-white' },
                m.kosten_eur != null ? EUR(m.kosten_eur) : '—',
              ),
            ),
          ),
        ),
      ),
    ),
  )
}

const KAT_LABELS = {
  nachtrag: 'Nachtrag', behinderungsanzeige: 'Behinderung', bedenkenanzeige: 'Bedenken',
  mangelanzeige: 'Mangel', protokoll: 'Protokoll', plan: 'Plan',
  foto: 'Foto', rechnung: 'Rechnung', vertrag: 'Vertrag', sonstiges: 'Sonstiges',
}
const KAT_FARBEN = {
  nachtrag: 'bg-orange-900/30 text-orange-300', behinderungsanzeige: 'bg-yellow-900/30 text-yellow-300',
  bedenkenanzeige: 'bg-blue-900/30 text-blue-300', mangelanzeige: 'bg-red-900/30 text-red-300',
  protokoll: 'bg-purple-900/30 text-purple-300', plan: 'bg-cyan-900/30 text-cyan-300',
  foto: 'bg-green-900/30 text-green-300', rechnung: 'bg-pink-900/30 text-pink-300',
  vertrag: 'bg-indigo-900/30 text-indigo-300', sonstiges: 'bg-gray-800 text-gray-400',
}

function formatBytes(bytes) {
  if (!bytes) return '\u2014'
  if (bytes < 1024) return bytes + ' B'
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'
  return (bytes/1024/1024).toFixed(1) + ' MB'
}

function DokumenteSeite() {
  const { token } = useAuth()
  const [dokumente, setDokumente] = useState([])
  const [stats, setStats] = useState(null)
  const [filter, setFilter] = useState('')
  const [suche, setSuche] = useState('')
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')
  const [showUpload, setShowUpload] = useState(false)
  const [uploadMsg, setUploadMsg] = useState('')

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      let q = '?projekt=FLI&limit=200'
      if (filter) q += `&kategorie=${filter}`
      if (suche) q += `&suche=${encodeURIComponent(suche)}`
      const r = await bpApi(`/dokumente/${q}`, { token })
      setDokumente(Array.isArray(r) ? r : [])
      const s = await bpApi('/dokumente/statistik?projekt=FLI', { token })
      setStats(s)
    } catch (e) { setErr(e.detail || 'Fehler beim Laden') }
    setLoading(false)
  }, [token, filter, suche])

  useEffect(() => { laden() }, [laden])

  const handleUpload = useCallback(async (e) => {
    e.preventDefault()
    const form = e.target
    const fileInput = form.querySelector('input[type=file]')
    const file = fileInput?.files?.[0]
    if (!file) return
    const fd = new FormData()
    fd.append('datei', file)
    fd.append('projekt', 'FLI')
    fd.append('kategorie', form.kategorie.value || 'sonstiges')
    if (form.beschreibung.value) fd.append('beschreibung', form.beschreibung.value)
    try {
      setUploadMsg('Wird hochgeladen...')
      const r = await bpUpload('/dokumente/upload', fd, token)
      setUploadMsg(`\u2705 ${r.dateiname} hochgeladen (${formatBytes(r.dateigroesse_bytes)})${r.duplikat_warnung ? ' \u26A0\uFE0F ' + r.duplikat_warnung : ''}`)
      form.reset()
      laden()
    } catch (e) {
      setUploadMsg(`\u274C ${e.detail || 'Upload fehlgeschlagen'}`)
    }
  }, [token, laden])

  const handleDownload = useCallback(async (dok) => {
    // Nutzt bpDownload statt direktem fetch → bekommt damit den Silent Token Refresh.
    // Vor dieser Aenderung lief der Aufruf an /dokumente/{id}/download nach 15 Min
    // Idle in einen unbehandelten 401 und der Klick „fiel ins Leere".
    try {
      const blob = await bpDownload(`/dokumente/${dok.id}/download`, { token })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url; a.download = dok.dateiname; a.click()
      URL.revokeObjectURL(url)
    } catch (e) {
      // bpDownload wirft {status, detail} — kein Error-Objekt, daher e.detail vor e.message.
      setErr(e.detail || e.message || 'Download fehlgeschlagen')
    }
  }, [token])

  return h('div', { className: 'fade-in' },
    // Kopfzeile
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, '\u{1F4C1} Dokumente'),
        stats && h('p', { className: 'text-sm text-bp-muted' },
          `${stats.gesamt} Dokument${stats.gesamt !== 1 ? 'e' : ''} \u00B7 ${formatBytes(stats.gesamtgroesse_bytes)}`
        ),
      ),
      h('button', {
        className: 'bp-btn px-4 py-2 rounded-lg text-sm',
        onClick: () => setShowUpload(!showUpload),
      }, showUpload ? 'Schlie\u00DFen' : '+ Hochladen'),
    ),
    // Upload-Formular
    showUpload && h('form', {
      onSubmit: handleUpload,
      className: 'bg-bp-card rounded-lg p-4 mb-6 border border-white/5 fade-in space-y-3',
    },
      h('input', { type: 'file', className: 'bp-input w-full px-3 py-2 rounded text-sm', required: true }),
      h('div', { className: 'flex gap-3' },
        h('select', { name: 'kategorie', className: 'bp-input px-3 py-2 rounded text-sm flex-1' },
          Object.entries(KAT_LABELS).map(([k, v]) =>
            h('option', { key: k, value: k }, v)
          ),
        ),
        h('input', { name: 'beschreibung', className: 'bp-input px-3 py-2 rounded text-sm flex-1', placeholder: 'Beschreibung (optional)' }),
      ),
      h('div', { className: 'flex items-center gap-3' },
        h(Button, { type: 'submit' }, 'Hochladen'),
        uploadMsg && h('span', { className: 'text-sm' }, uploadMsg),
      ),
    ),
    // Suche
    h('div', { className: 'mb-4' },
      h('input', {
        className: 'bp-input px-4 py-2 rounded-lg text-sm w-full max-w-md',
        placeholder: 'Dateiname suchen...', value: suche, onChange: e => setSuche(e.target.value),
      }),
    ),
    // Kategorie-Filter
    h('div', { className: 'flex gap-2 mb-4 flex-wrap' },
      [['', 'Alle'], ...Object.entries(KAT_LABELS)].map(([v, l]) =>
        h('button', {
          key: v, onClick: () => setFilter(v),
          className: `px-3 py-1.5 rounded-lg text-xs font-medium transition ${
            filter === v ? 'bg-bp-400 text-bp-dark' : 'bg-bp-card text-bp-muted hover:text-white border border-white/5'
          }`,
        }, l)
      ),
    ),
    err && h(Alert, { type: 'error' }, err),
    loading ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Laden...')
    : dokumente.length === 0 ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Keine Dokumente gefunden.')
    : h('div', { className: 'space-y-1' },
        h('div', { className: 'grid grid-cols-12 gap-2 px-4 py-2 text-xs text-bp-muted font-medium uppercase tracking-wider' },
          h('div', { className: 'col-span-4' }, 'Dateiname'),
          h('div', { className: 'col-span-2' }, 'Kategorie'),
          h('div', { className: 'col-span-2 text-right' }, 'Gr\u00F6\u00DFe'),
          h('div', { className: 'col-span-2' }, 'Datum'),
          h('div', { className: 'col-span-2 text-right' }, 'Aktion'),
        ),
        dokumente.map(d =>
          h('div', {

function EUR(val) {
  if (val == null || val === '' || isNaN(Number(val))) return '\u2014'
  return Number(val).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' })
}

function parseVorlageAbschnitte(text) {
  if (!text) return null
  const abschnitte = { sachverhalt: '', pruefergebnis: '', einschaetzung: '' }
  const markers = [
    { key: 'sachverhalt', re: /SACHVERHALT[:\s]*/i },
    { key: 'pruefergebnis', re: /PR(?:\u00DC|UE)FERGEBNIS[:\s]*/i },
    { key: 'einschaetzung', re: /BAUPILOT[- ]EINSCH(?:\u00C4|AE)TZUNG[:\s]*/i },
  ]
  let rest = text
  // Try to split by markers
  const positions = markers.map(m => {
    const match = rest.match(m.re)
    return match ? { key: m.key, idx: rest.indexOf(match[0]), len: match[0].length } : null
  }).filter(Boolean).sort((a, b) => a.idx - b.idx)

  if (positions.length >= 2) {
    for (let i = 0; i < positions.length; i++) {
      const start = positions[i].idx + positions[i].len
      const end = i + 1 < positions.length ? positions[i + 1].idx : rest.length
      abschnitte[positions[i].key] = rest.substring(start, end).trim()
    }
    return abschnitte
  }
  // Fallback: try paragraph split
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim())
  if (paragraphs.length >= 3) {
    abschnitte.sachverhalt = paragraphs[0].trim()
    abschnitte.pruefergebnis = paragraphs[1].trim()
    abschnitte.einschaetzung = paragraphs.slice(2).join('\n\n').trim()
  } else {
    abschnitte.sachverhalt = text
  }
  return abschnitte
}

    setActionLoading(true)

      // Query-String aufbauen: variante immer, Betrag bei A, beide Begruendungen
      // werden URL-encoded mitgeschickt (NT-F-04). Backend macht das BOOL-Mapping

function NachtraegeSeite() {
  const { token } = useAuth()
  const [nachtraege, setNachtraege] = useState([])
  const [gesamt, setGesamt] = useState(0)
  const [summeGefordert, setSummeGefordert] = useState(0)
  const [summeGenehmigt, setSummeGenehmigt] = useState(0)
  const [filter, setFilter] = useState('')
  const [suche, setSuche] = useState('')
  const [selected, setSelected] = useState(null)
  const [loading, setLoading] = useState(true)
  const [err, setErr] = useState('')

  const laden = useCallback(async () => {
    setLoading(true)
    try {
      let q = ''
      if (filter) q += `&status=${filter}`
      if (suche) q += `&suche=${encodeURIComponent(suche)}`
      const r = await bpApi(`/nachtraege/?projekt=FLI${q}&limit=200`, { token })
      setNachtraege(r.nachtraege || []); setGesamt(r.gesamt || 0)
      setSummeGefordert(r.summe_gefordert || 0); setSummeGenehmigt(r.summe_genehmigt || 0)
    } catch (e) {
      // Fallback: alter Vorgaenge-Endpoint
      try {
        const r = await bpApi(`/vorgaenge/?projekt=FLI&typ=nachtrag${filter ? '&status=' + filter : ''}${suche ? '&suche=' + encodeURIComponent(suche) : ''}&limit=200`, { token })
        setNachtraege(r.vorgaenge || []); setGesamt(r.gesamt || 0)
      } catch (e2) { setErr(e2.detail || 'Fehler beim Laden') }
    }
    setLoading(false)
  }, [token, filter, suche])

  useEffect(() => { laden() }, [laden])

  if (selected) return h(NachtragDetail, { id: selected, onBack: () => { setSelected(null); laden() } })

  return h('div', { className: 'fade-in' },
    h('div', { className: 'flex items-center justify-between mb-6' },
      h('div', null,
        h('h2', { className: 'text-lg font-semibold text-white' }, '\uD83D\uDCCB Nachtr\u00E4ge'),
        h('p', { className: 'text-sm text-bp-muted' }, `${gesamt} Nachtr\u00E4ge im Projekt FLI`),
        summeGefordert > 0 && h('p', { className: 'text-xs text-bp-muted mt-1' },
          `Gefordert: ${summeGefordert.toLocaleString('de-DE', {style:'currency',currency:'EUR'})} | Genehmigt: ${summeGenehmigt.toLocaleString('de-DE', {style:'currency',currency:'EUR'})}`
        ),
      ),
    ),
    h('input', { className: 'bp-input px-4 py-2 rounded-lg text-sm w-full max-w-md mb-4', placeholder: 'Nummer oder Gegenstand suchen...', value: suche, onChange: e => setSuche(e.target.value) }),
    h('div', { className: 'flex gap-2 mb-4 flex-wrap' },
      [['', 'Alle'], ['offen', 'Offen'], ['in_bearbeitung', 'In Bearb.'], ['abgeschlossen', 'Erledigt'], ['storniert', 'Abgelehnt']].map(([v, l]) =>
        h('button', { key: v, onClick: () => setFilter(v), className: `px-3 py-1.5 rounded-lg text-xs font-medium transition ${filter === v ? 'bg-bp-400 text-bp-dark' : 'bg-bp-card text-bp-muted hover:text-white border border-white/5'}` }, l)
      ),
    ),
    err && h(Alert, { type: 'error' }, err),
    loading ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Laden...')
    : nachtraege.length === 0 ? h('p', { className: 'text-bp-muted text-sm py-8 text-center' }, 'Keine Nachtr\u00E4ge gefunden.')
    : h('div', { className: 'space-y-1' },
        h('div', { className: 'grid grid-cols-12 gap-2 px-4 py-2 text-xs text-bp-muted font-medium uppercase tracking-wider' },
          h('div', { className: 'col-span-2' }, 'Nummer'),
          h('div', { className: 'col-span-5' }, 'Gegenstand'),
          h('div', { className: 'col-span-2 text-right' }, 'Betrag'),
          h('div', { className: 'col-span-1 text-center' }, 'Var.'),
          h('div', { className: 'col-span-2 text-right' }, 'Status'),
        ),
        nachtraege.map(nt => h('div', {
          key: nt.id,
          className: 'grid grid-cols-12 gap-2 px-4 py-3 rounded-lg bg-bp-card border border-white/5 hover:border-white/10 transition cursor-pointer items-center',
          onClick: () => setSelected(nt.id),
        },
          h('div', { className: 'col-span-2 font-mono text-sm text-bp-400' }, nt.nummer),
          h('div', { className: 'col-span-5 text-sm text-white truncate' }, nt.gegenstand),
          h('div', { className: 'col-span-2 text-right text-sm text-bp-muted' }, nt.betrag_gefordert ? Number(nt.betrag_gefordert).toLocaleString('de-DE', {maximumFractionDigits: 0}) + ' \u20AC' : '\u2014'),
          h('div', { className: 'col-span-1 text-center' },
            nt.nachtragsvariante ? h('span', { className: `text-xs px-2 py-0.5 rounded font-medium ${nt.nachtragsvariante === 'A' ? 'bg-green-900/40 text-green-300' : nt.nachtragsvariante === 'C' ? 'bg-red-900/40 text-red-300' : 'bg-yellow-900/40 text-yellow-300'}` }, nt.nachtragsvariante) : '\u2014',
          ),
          h('div', { className: 'col-span-2 text-right' },
            h('span', { className: `text-xs px-2 py-1 rounded ${nt.status === 'abgeschlossen' ? 'bg-green-900/40 text-green-300' : nt.status === 'storniert' ? 'bg-gray-800 text-gray-400' : 'bg-bp-card text-bp-muted border border-white/10'}` }, STATUS_LABELS[nt.status] || nt.status),
          ),
        )),
      ),
  )
}

// E10 / B-012: Bell-Icon mit Badge fuer In-App-Benachrichtigungen.
// Polling der Anzahl ungelesener Benachrichtigungen alle 30 Sekunden.
// Beim Oeffnen des Dropdowns wird die volle Liste der letzten 10 geladen.
// Klick auf eine Benachrichtigung markiert sie als gelesen.
function BellMenu() {
  const { token } = useAuth()
  const [ungelesen, setUngelesen] = useState(0)
  const [offen, setOffen] = useState(false)
  const [liste, setListe] = useState([])
  const [loadingListe, setLoadingListe] = useState(false)

  // Anzahl-Polling alle 30s. Ein einzelner Endpoint, sehr leichtgewichtig.
  // Bei Aktion (Lesen) sofort neu pullen, damit Badge sich aktualisiert.
  const ladeAnzahl = useCallback(async () => {
    try {
      const r = await bpApi('/benachrichtigungen/ungelesen-anzahl', { token })
      setUngelesen(r.ungelesen || 0)
    } catch { /* stumm — Bell darf nie blockieren */ }
  }, [token])

  useEffect(() => {
    if (!token) return
    ladeAnzahl()
    const iv = setInterval(ladeAnzahl, 30000)
    return () => clearInterval(iv)
  }, [token, ladeAnzahl])

  // Beim Oeffnen die Liste der letzten 10 laden
  const oeffnen = async () => {
    setOffen(true)
    setLoadingListe(true)
    try {
      const r = await bpApi('/benachrichtigungen/?limit=10', { token })
      setListe(r.benachrichtigungen || [])
    } catch { /* stumm */ }
    setLoadingListe(false)
  }

  const markiereGelesen = async (id) => {
    try {
      await bpApi(`/benachrichtigungen/${id}/gelesen`, { method: 'POST', token })
      // Lokale Liste anpassen + Badge neu pullen
      setListe(prev => prev.map(b => b.id === id ? { ...b, gelesen: true } : b))
      ladeAnzahl()
    } catch { /* stumm */ }
  }

  const alleGelesen = async () => {
    try {
      await bpApi('/benachrichtigungen/alle-gelesen', { method: 'POST', token })
      setListe(prev => prev.map(b => ({ ...b, gelesen: true })))
      ladeAnzahl()
    } catch { /* stumm */ }
  }

  // Klick auf Eintrag oeffnet derzeit nichts — Detailansicht-Navigation folgt
  // mit Etappen 12/13 (wenn Protokolle/Verknuepfungen verfuegbar sind).
  // Heute markiert ein Klick nur als gelesen.

  return h('div', { style: { position: 'relative' } },
    h('button', {
      className: 'bp-btn-outline px-3 py-2 rounded-lg text-xs relative',
      onClick: () => offen ? setOffen(false) : oeffnen(),
      title: ungelesen > 0 ? `${ungelesen} ungelesene Benachrichtigung${ungelesen === 1 ? '' : 'en'}` : 'Keine ungelesenen Benachrichtigungen',
    },
      '🔔',
      ungelesen > 0 && h('span', {
        style: {
          position: 'absolute', top: '-4px', right: '-4px',
          minWidth: '18px', height: '18px', padding: '0 4px',
          background: '#ef4444', color: 'white',
          borderRadius: '9px', fontSize: '10px',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontWeight: 'bold',
        },
      }, ungelesen > 99 ? '99+' : String(ungelesen)),
    ),
    offen && h('div', {
      style: {
        position: 'absolute', top: 'calc(100% + 8px)', right: 0,
        width: '380px', maxWidth: '90vw',
        background: '#1a1a1a', border: '1px solid rgba(255,255,255,0.08)',
        borderRadius: '12px', padding: '12px',
        boxShadow: '0 12px 32px rgba(0,0,0,0.6)',
        zIndex: 50,
      },
    },
      h('div', { className: 'flex items-center justify-between mb-2' },
        h('span', { className: 'text-xs uppercase tracking-widest text-gray-500' }, 'Benachrichtigungen'),
        ungelesen > 0 && h('button', {
          className: 'text-[11px] text-bp-400 hover:underline',
          onClick: alleGelesen,
        }, 'Alle gelesen'),
      ),
      loadingListe
        ? h('p', { className: 'text-xs text-gray-500 py-4 text-center' }, 'Laden…')
        : liste.length === 0
          ? h('p', { className: 'text-xs text-gray-500 py-4 text-center' }, 'Keine Benachrichtigungen.')
          : h('div', { style: { maxHeight: '50vh', overflowY: 'auto' }, className: 'space-y-1.5' },
              liste.map(b => h('div', {
                key: b.id,
                onClick: () => !b.gelesen && markiereGelesen(b.id),
                style: {
                  padding: '10px 12px', borderRadius: '8px',
                  background: b.gelesen ? 'rgba(255,255,255,0.02)' : 'rgba(245,166,35,0.06)',
                  border: `1px solid ${b.gelesen ? 'rgba(255,255,255,0.04)' : 'rgba(245,166,35,0.15)'}`,
                  cursor: b.gelesen ? 'default' : 'pointer',
                },
              },
                h('div', { className: 'flex items-start justify-between gap-2 mb-1' },
                  h('span', { className: 'text-[11px] font-semibold text-white' }, b.titel),
                  h('span', { className: 'text-[9px] text-gray-500 whitespace-nowrap' },
                    new Date(b.erstellt_am).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
                  ),
                ),
                h('p', { className: 'text-[11px] text-gray-400 whitespace-pre-wrap' }, b.inhalt),
                !b.gelesen && h('span', {
                  className: 'text-[9px] text-amber-300 mt-1 inline-block',
                  style: { textTransform: 'uppercase', letterSpacing: '0.1em' },
                }, '• ungelesen — klick markiert als gelesen'),
              )),
            ),
    ),
  )
}
