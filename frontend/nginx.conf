server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: alle Nicht-API-Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy: /api/* -> baupilot-api:8000
    location /api/ {
        proxy_pass http://baupilot-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeout fuer LLM-Aufrufe (Entscheidungsvorlage ~30-120s)
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        # P3: SSE sofort durchreichen — sonst kommen token/status-Events
        # gebuendelt erst am Stream-Ende an (zusaetzlich zum X-Accel-Buffering:no
        # der API-Response).
        proxy_buffering off;
        proxy_cache off;
    }

    # Health-Check
    location /health {
        proxy_pass http://baupilot-api:8000/health;
    }
}
