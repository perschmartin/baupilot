# BauPilot — Infrastruktur
# Verwendung: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: baupilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baupilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baupilot_dev}
      POSTGRES_DB: ${POSTGRES_DB:-baupilot}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - baupilot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baupilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baupilot

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: baupilot-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6345}:6333"
      - "${QDRANT_GRPC_PORT:-6346}:6334"
    volumes:
      - baupilot-qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baupilot

  minio:
    image: minio/minio:latest
    container_name: baupilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-baupilot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-baupilot_dev}
    ports:
      - "${MINIO_API_PORT:-9004}:9000"
      - "${MINIO_CONSOLE_PORT:-9005}:9001"
    volumes:
      - baupilot-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baupilot

volumes:
  baupilot-pgdata:
  baupilot-qdrant:
  baupilot-minio:

networks:
  baupilot:
    name: baupilot
